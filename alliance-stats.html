<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alliance Intelligence // CORE_V2</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .app-container { position: relative; z-index: 1; }

        .sticky-wrapper {
            position: sticky; 
            top: 0; 
            z-index: 999; 
            padding: 10px 20px;
            background: rgba(13, 13, 13, 0.8); 
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
        }

        .primary-controls {
            display: flex; 
            flex-wrap: wrap; 
            gap: 15px; 
            align-items: center;
        }

        .player-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
            padding: 40px 20px; 
        }

        .growth-card {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
        }

        .growth-card:hover { transform: translateY(-8px); }

        .metric-bar { 
            display: flex; 
            gap: 6px; 
            overflow-x: auto; 
            padding: 15px 0 5px 0; 
            scrollbar-width: none; 
        }
        
        .solo-header {
            padding: 60px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        html { overflow-y: scroll; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="loading-overlay" id="globalLoader">
    <div class="loading-text">SYNCING_CORE_FILES...</div>
</div>

<div class="app-container">
    <div class="header-nav" id="topNav">
        <a href="index.html" class="exit-btn" id="btn-system-return">← SYSTEM_RETURN</a>
        <button class="exit-btn hidden" id="btn-terminate-view" onclick="exitSoloMode()">← TERMINATE_VIEW</button>
        
        <div id="rowCountDisplay" style="font-weight:900; color: var(--accent-purple); font-size: 0.75rem;">ACTIVE_SUBJECTS: 0</div>
    </div>

    <div class="sticky-wrapper" id="controlWrapper">
        <div class="primary-controls">
            <div class="view-toggle-container">
                <input type="radio" name="vMode" id="vSnap" value="single" checked onchange="toggleMode()">
                <label for="vSnap">Snapshot</label>
                <input type="radio" name="vMode" id="vRange" value="range" onchange="toggleMode()">
                <label for="vRange">Progress</label>
                <div class="toggle-glider"></div>
            </div>
            
            <div id="startPicker" class="hidden custom-select-wrapper">
                <select id="dateStart" onchange="processData()"></select>
            </div>
            <div class="custom-select-wrapper">
                <select id="dateEnd" onchange="processData()"></select>
            </div>
            
            <div class="custom-select-wrapper" id="allianceFilterWrap">
                <select id="allianceSelect" onchange="processData()">
                    <option value="all">All Servers</option>
                </select>
            </div>
            <input type="text" id="playerSearch" class="search-box" placeholder="SCAN_SUBJECT_DATABASE..." oninput="filterAndRender()">
        </div>
        
        <div class="metric-bar" id="metricBar"></div>
    </div>

    <div id="fleetView">
        <div class="player-grid" id="mainGrid"></div>
    </div>

    <div id="soloView" class="hidden">
        <div class="solo-header" id="soloHeader"></div>
        <div class="player-grid" id="soloGrid"></div>
    </div>
</div>

<script>
    let currentSort = 'merits';
    let currentTableData = [];
    let allianceTagMap = {}; 
    let fileListData = {};
    let activeSoloId = null;

    const metrics = {
        'highest_power': 'Highest Power', 'merits': 'Merits', 'units_killed': 'Total Kills',
        'killcount_t5': 'T5 Kills', 'killcount_t4': 'T4 Kills', 'killcount_t3': 'T3 Kills',
        'killcount_t2': 'T2 Kills', 'killcount_t1': 'T1 Kills', 'units_dead': 'Deads',
        'units_healed': 'Healed', 'gold_spent': 'Gold Spent', 'wood_spent': 'Wood Spent',
        'stone_spent': 'Stone Spent', 'mana_spent': 'Mana Spent'
    };
    
    const numericFields = Object.keys(metrics);

    function init() {
        const bar = document.getElementById('metricBar');
        Object.entries(metrics).forEach(([key, label]) => {
            const btn = document.createElement('button');
            btn.className = `metric-btn ${key === currentSort ? 'active' : ''}`;
            btn.textContent = label;
            btn.onclick = () => {
                document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSort = key;
                filterAndRender();
            };
            bar.appendChild(btn);
        });
        scanFiles();
    }

    async function scanFiles() {
        showLoader(true);
        try {
            const response = await fetch('data/files.json');
            fileListData = await response.json();
            
            let sortedPaths = [...fileListData.mainDataFiles].sort((a, b) => {
                return parseDate(a.split('/').pop()) - parseDate(b.split('/').pop());
            });

            const oldestFilePath = sortedPaths[0]; 
            const oldestRes = await fetch(oldestFilePath);
            updateAllianceList(await oldestRes.text());

            let displayFiles = [...fileListData.mainDataFiles].sort((a, b) => parseDate(b.split('/').pop()) - parseDate(a.split('/').pop()));

            if (displayFiles.length > 0) {
                const startSelect = document.getElementById('dateStart');
                const endSelect = document.getElementById('dateEnd');
                const allianceSelect = document.getElementById('allianceSelect');
                startSelect.innerHTML = ""; endSelect.innerHTML = "";
                
                displayFiles.forEach((fullPath) => {
                    const name = fullPath.split('/').pop();
                    const opt = document.createElement('option');
                    opt.value = fullPath;
                    opt.textContent = name.replace('.csv','');
                    startSelect.appendChild(opt.cloneNode(true));
                    endSelect.appendChild(opt);
                });
                
                endSelect.selectedIndex = 0;
                if (displayFiles.length > 1) startSelect.selectedIndex = 1;

                // CHECK FOR URL PARAMETERS
                const urlParams = new URLSearchParams(window.location.search);
                const allianceToFilter = urlParams.get('alliance');

                if (allianceToFilter) {
                    // Look through options to find the one matching the tag
                    for (let i = 0; i < allianceSelect.options.length; i++) {
                        if (allianceSelect.options[i].text.includes(`[${allianceToFilter}]`) || 
                            allianceSelect.options[i].text.startsWith(allianceToFilter)) {
                            allianceSelect.selectedIndex = i;
                            break;
                        }
                    }
                }
                
                await processData();

                const targetId = urlParams.get('id');
                if (targetId) enterSoloMode(targetId);
            }
        } catch (e) { console.error(e); }
        showLoader(false);
    }

    async function processData() {
        showLoader(true);
        const selA = document.getElementById('dateStart').value;
        const selB = document.getElementById('dateEnd').value;
        const selectedServer = document.getElementById('allianceSelect').value;
        const isRange = document.getElementById('vRange').checked;

        try {
            const endRes = await fetch(selB);
            const endText = await endRes.text();
            const endData = parseCSV(endText);
            
            let filteredRaw = Object.values(endData).filter(row => (parseInt(row.highest_power) || 0) >= 15000000);
            if (selectedServer !== "all") filteredRaw = filteredRaw.filter(row => row.home_server === selectedServer);

            currentTableData = filteredRaw.map(row => {
                row.alliance_tag = allianceTagMap[row.home_server] || '-';
                return { ...row, _isDiff: false };
            });

            if (isRange) {
                const startRes = await fetch(selA);
                const startText = await startRes.text();
                const startData = parseCSV(startText);
                currentTableData = currentTableData.map(newRow => {
                    const diffRow = { ...newRow, _isDiff: true, _deltas: {} };
                    const oldRow = startData[newRow.lord_id];
                    numericFields.forEach(f => {
                        let newVal = parseInt(newRow[f]) || 0;
                        let oldVal = oldRow ? (parseInt(oldRow[f]) || 0) : newVal;
                        diffRow._deltas[f] = newVal - oldVal;
                    });
                    return diffRow;
                });
            }
            filterAndRender();
            if (activeSoloId) renderSoloData(activeSoloId);
        } catch (e) { console.error(e); }
        showLoader(false);
    }

    function updateAllianceList(csvText) {
        const serverMap = {};
        const lines = csvText.split(/\r?\n/).filter(l => l.trim());
        const headers = splitCSVLine(lines[0]).map(h => cleanCell(h).toLowerCase());
        const sIdx = headers.indexOf('home_server'), tIdx = headers.indexOf('alliance_tag');
        
        lines.slice(1).forEach(line => {
            const cells = splitCSVLine(line);
            const sID = cleanCell(cells[sIdx]), tag = cleanCell(cells[tIdx]);
            if (sID && tag && tag !== "null" && tag !== "-") {
                if (!serverMap[sID]) serverMap[sID] = {};
                serverMap[sID][tag] = (serverMap[sID][tag] || 0) + 1;
            }
        });

        const select = document.getElementById('allianceSelect');
        select.innerHTML = '<option value="all">All Servers</option>';
        allianceTagMap = {};
        Object.keys(serverMap).sort((a,b)=>parseInt(a)-parseInt(b)).forEach(id => {
            const tags = serverMap[id];
            const bestTag = Object.keys(tags).reduce((a, b) => tags[a] > tags[b] ? a : b);
            allianceTagMap[id] = bestTag;
            const opt = document.createElement('option');
            opt.value = id;
            opt.textContent = `${bestTag} (${id})`;
            select.appendChild(opt);
        });
    }

    function filterAndRender() {
        const query = document.getElementById('playerSearch').value.toLowerCase().trim();
        
        currentTableData.sort((a, b) => {
            let valA = (a._isDiff && currentSort !== 'highest_power') ? (a._deltas[currentSort]||0) : (parseInt(a[currentSort])||0);
            let valB = (b._isDiff && currentSort !== 'highest_power') ? (b._deltas[currentSort]||0) : (parseInt(b[currentSort])||0);
            return valB - valA;
        });

        currentTableData.forEach((row, idx) => row._globalRank = idx + 1);
        let displayData = currentTableData.filter(row => (row.name || '').toLowerCase().includes(query) || (row.lord_id || '').toLowerCase().includes(query));

        document.getElementById('rowCountDisplay').innerText = `ACTIVE_SUBJECTS: ${displayData.length}`;
        const container = document.getElementById('mainGrid');
        container.innerHTML = ""; 

        displayData.forEach((row) => {
            const rankPos = row._globalRank;
            const card = document.createElement('div');
            let glow = "glow-purple", banner = "rank-std-banner";
            if (rankPos === 1) { glow = "glow-1"; banner = "rank-1-banner"; }
            else if (rankPos === 2) { glow = "glow-2"; banner = "rank-2-banner"; }
            else if (rankPos === 3) { glow = "glow-3"; banner = "rank-3-banner"; }

            card.className = `growth-card ${glow}`;
            card.onclick = () => enterSoloMode(row.lord_id);

            const isProgressMode = row._isDiff && currentSort !== 'highest_power';
            const displayValue = isProgressMode ? (row._deltas[currentSort] || 0) : (parseInt(row[currentSort]) || 0);
            
            const colorStyle = isProgressMode ? (displayValue >= 0 ? 'var(--positive)' : 'var(--negative)') : 'var(--text-title)';
            const arrowPrefix = isProgressMode ? (displayValue >= 0 ? '▲ ' : '▼ ') : '';
            
            card.innerHTML = `
                <div class="rank-banner ${banner}">#${rankPos}</div>
                <div style="margin-bottom:18px; padding-right: 70px;">
                    <h3 style="margin:0; font-size:1.7rem; font-weight:800; color:var(--text-title);">${row.name}</h3>
                    <div style="font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-top:6px;">ID: ${row.lord_id}</div>
                    <div style="color:var(--accent-purple); font-size:0.75rem; font-weight:900; margin-top:4px;">[${row.alliance_tag}]</div>
                </div>
                <div style="background:rgba(10, 2, 15, 0.5); padding:16px; border-radius:14px; border:1px solid var(--border-color);">
                    <div class="stat-label">${metrics[currentSort]}</div>
                    <div style="display:flex; align-items:center;">
                        <div class="stat-value" style="color:${colorStyle};">${arrowPrefix}${Math.abs(displayValue).toLocaleString()}</div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function enterSoloMode(id) {
        activeSoloId = id;
        document.getElementById('fleetView').classList.add('hidden');
        document.getElementById('soloView').classList.remove('hidden');
        document.getElementById('btn-system-return').classList.add('hidden');
        document.getElementById('btn-terminate-view').classList.remove('hidden');
        document.getElementById('allianceFilterWrap').classList.add('hidden');
        document.getElementById('playerSearch').classList.add('hidden');
        document.getElementById('metricBar').classList.add('hidden');
        document.getElementById('rowCountDisplay').classList.add('hidden');
        renderSoloData(id);
        window.scrollTo(0,0);
    }

    function renderSoloData(id) {
        const row = currentTableData.find(r => r.lord_id === id);
        if (!row) return;
        const header = document.getElementById('soloHeader');
        header.innerHTML = `
            <h1 style="margin:0; font-size:3.5rem; font-weight:900; color:var(--text-title);">${row.name}</h1>
            <div style="color:var(--text-dim); font-size:0.85rem; font-weight:900; letter-spacing:1px; margin-top: 10px;">
                ID: ${row.lord_id} // SERVER: ${row.home_server} // ALLIANCE: [${row.alliance_tag}]
            </div>
        `;
        const grid = document.getElementById('soloGrid'); 
        grid.innerHTML = "";
        Object.keys(metrics).forEach(m => {
            const card = document.createElement('div'); 
            card.className = "growth-card glow-purple"; 
            const val = parseInt(row[m]) || 0;
            let diffHTML = row._isDiff ? `<div class="diff-tag ${row._deltas[m] >= 0 ? 'positive' : 'negative'}" style="margin-top:8px; display:inline-block;">${row._deltas[m] >= 0 ? '▲' : '▼'} ${Math.abs(row._deltas[m]).toLocaleString()}</div>` : "";
            card.innerHTML = `<div class="stat-label">${metrics[m]}</div><div class="stat-value" style="font-size:1.8rem;">${val.toLocaleString()}</div>${diffHTML}`;
            grid.appendChild(card);
        });
    }

    function exitSoloMode() { 
        activeSoloId = null;
        document.getElementById('soloView').classList.add('hidden'); 
        document.getElementById('fleetView').classList.remove('hidden'); 
        document.getElementById('btn-system-return').classList.remove('hidden');
        document.getElementById('btn-terminate-view').classList.add('hidden');
        document.getElementById('allianceFilterWrap').classList.remove('hidden');
        document.getElementById('playerSearch').classList.remove('hidden');
        document.getElementById('metricBar').classList.remove('hidden');
        document.getElementById('rowCountDisplay').classList.remove('hidden');
    }
    
    function toggleMode() { 
        const isRange = document.getElementById('vRange').checked; 
        document.getElementById('startPicker').classList.toggle('hidden', !isRange); 
        processData(); 
    }
    
    function showLoader(s) { document.getElementById('globalLoader').style.display = s ? 'flex' : 'none'; }
    function parseDate(f) { const p = f.replace('.csv','').split('-'); return new Date(p[2], p[1]-1, p[0]); }
    function cleanCell(v) { return (v || "").replace(/^"|"$/g, '').trim(); }
    function splitCSVLine(l) {
        const res = []; let cur = "", inQ = false;
        for (let char of l) { if (char === '"') inQ = !inQ; else if (char === ',' && !inQ) { res.push(cur); cur = ""; } else cur += char; }
        res.push(cur); return res;
    }
    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        const headers = splitCSVLine(lines[0]).map(h => cleanCell(h).toLowerCase());
        return lines.slice(1).reduce((acc, line) => {
            const cells = splitCSVLine(line); const row = {};
            headers.forEach((h, i) => { 
                let val = cleanCell(cells[i]); 
                if (numericFields.includes(h)) val = val.replace(/,/g, ''); 
                row[h] = val; 
            });
            if (row.lord_id) acc[row.lord_id] = row; return acc;
        }, {});
    }
    window.onload = init;
</script>
</body>
</html>
