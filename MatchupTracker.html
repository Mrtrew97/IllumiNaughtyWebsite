<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchup Analysis // KVK-DATA</title>
    <style>
        :root {
            --main-width: 1400px;
            --side-col-width: 300px; 
            --color-cyan: #22d3ee;
            --color-gold: #fbbf24;
            --color-title: #e2e8f0;
            --bg-color: #030005; 
            --card-bg: rgba(20, 10, 30, 0.6);
            --text-main: #ffffff;
            --text-dim: #9d8ba1;
            --accent-purple: #9333ea;
            --border-color: rgba(147, 51, 234, 0.15);
            --positive: #22c55e;
            --negative: #ef4444;
        }

        html, body { 
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main); 
            background-image: 
                radial-gradient(circle at 50% 100%, #150520 0%, transparent 60%),
                radial-gradient(circle at 50% -20%, #2a0a3a 0%, transparent 50%),
                radial-gradient(circle at 10% 80%, #1a0225 0%, transparent 30%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .app-container { padding: 30px; max-width: 1600px; margin: 0 auto; }

        .header-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
        }

        .exit-btn {
            color: var(--text-dim); 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 0.65rem; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border: 1px solid transparent;
            border-radius: 6px;
            display: flex;
            align-items: center;
            background: transparent;
        }
        .exit-btn:hover { color: white; background: rgba(147, 51, 234, 0.1); }

        .alignment-grid {
            display: grid;
            grid-template-columns: var(--side-col-width) 1fr var(--side-col-width);
            max-width: var(--main-width);
            margin: 0 auto;
            gap: 20px;
            align-items: center;
        }

        .primary-controls { 
            background: rgba(147, 51, 234, 0.03); 
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        .custom-select-wrapper { 
            position: relative; 
            display: flex; 
            width: 100%;
        }

        .custom-select-wrapper select { 
            appearance: none;
            -webkit-appearance: none;
            background: rgba(30, 10, 45, 0.8) !important; 
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 15px; 
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-size: 0.8rem; 
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: background 0.2s ease;
            backdrop-filter: blur(10px);
            width: 100%;
            text-align: center;
            text-align-last: center;
        }

        .custom-select-wrapper::after {
            content: ''; 
            border-left: 4px solid transparent; 
            border-right: 4px solid transparent;
            border-top: 5px solid var(--accent-purple);
            position: absolute; 
            right: 15px; 
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none; 
        }

        .versus-divider {
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 1.2rem;
            color: var(--accent-purple);
            opacity: 0.6;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(147, 51, 234, 0.4);
        }
        
        .matchup-grid { align-items: start; }
        
        .alliance-select-panel { 
            background: var(--card-bg);
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            padding: 20px; 
            backdrop-filter: blur(10px); 
            box-sizing: border-box;
            text-align: center;
            position: sticky;
            top: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        
        .multi-select-box { 
            width: 100%; 
            height: auto; 
            min-height: 400px;
            background: rgba(0, 0, 0, 0.3); 
            border: 1px solid var(--border-color); 
            border-radius: 12px; 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            font-size: 0.8rem; 
            margin-top: 12px; 
            outline: none !important; 
            padding: 12px 8px 20px 8px;
            overflow-y: auto; 
            appearance: none;
            text-align: center;
            box-sizing: border-box; 
        }
        
        .multi-select-box option { 
            padding: 10px; 
            border-radius: 6px; 
            margin-bottom: 2px; 
            cursor: pointer; 
            color: #ffffff; 
            font-weight: 800; 
            background: transparent;
        }

        .multi-select-box option:checked { 
            background: linear-gradient(90deg, rgba(147, 51, 234, 0.8) 0%, rgba(147, 51, 234, 0.4) 100%) !important; 
            color: white !important; 
        }
        
        .comparison-center-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .hero-delta-view { 
            background: linear-gradient(180deg, rgba(147, 51, 234, 0.1) 0%, rgba(20, 10, 30, 0.85) 100%); 
            border: 1px solid var(--border-color); 
            border-radius: 24px 24px 0 0; 
            padding: 20px; 
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(147, 51, 234, 0.3);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            gap: 15px;
        }

        .coalition-block { width: 100%; text-align: center; }
        .coalition-name { 
            font-size: 1.1rem; 
            font-weight: 900; 
            letter-spacing: -0.5px; 
            margin-top: 5px; 
            text-transform: uppercase;
        }
        #tagA { color: var(--color-cyan); }
        #tagB { color: var(--color-gold); }
        
        .vs-badge { 
            font-weight: 950; 
            color: var(--accent-purple); 
            font-size: 1.5rem; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            text-align: center;
            text-shadow: 0 0 20px rgba(147, 51, 234, 0.6);
            padding: 0 10px;
        }

        .metric-comparison-list {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-top: none; 
            border-radius: 0 0 24px 24px;
            overflow: hidden;
        }

        .metric-row {
            display: grid;
            grid-template-columns: 1fr 220px 1fr;
            align-items: center;
            padding: 15px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .col-a { display: flex; justify-content: flex-end; align-items: center; gap: 15px; font-size: 1.1rem; color: var(--color-cyan); font-weight: 800; padding-right: 15px; }
        .col-b { display: flex; justify-content: flex-start; align-items: center; gap: 15px; font-size: 1.1rem; color: var(--color-gold); font-weight: 800; padding-left: 15px; }
        .col-gap { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        
        .metric-label-style { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .delta-value { font-size: 0.8rem; font-weight: 900; }
        .indicator-arrow { font-size: 1.4rem; font-weight: 900; }
        .stat-label { font-size: 0.75rem; color: #d1cada; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 5px; }
        
        .loading-overlay { position: fixed; inset: 0; background: rgba(3,0,5,0.98); display: none; justify-content: center; align-items: center; z-index: 2000; }
        .loading-text { color: var(--accent-purple); font-weight: 900; letter-spacing: 5px; font-size: 0.7rem; }
        .positive { color: var(--positive); }
        .negative { color: var(--negative); }
    </style>
</head>
<body>
<div class="loading-overlay" id="globalLoader">
    <div class="loading-text">CALCULATING_MATCHUP_DATA...</div>
</div>
<div class="app-container">
    <header class="header-nav">
        <a href="index.html" class="exit-btn">← SYSTEM_RETURN</a>
        <div style="text-align: right;">
            <div class="stat-label" id="namingSourceLabel">Syncing timeline files...</div>
            <h1 style="margin:0; font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; text-transform: uppercase;">MATCHUP_ANALYSIS</h1>
        </div>
    </header>
    
    <div class="alignment-grid primary-controls">
        <div class="custom-select-wrapper">
            <select id="dateStart" onchange="handleDateChange()"></select>
        </div>
        <div class="versus-divider">TIMELINE_SCOPE</div>
        <div class="custom-select-wrapper">
            <select id="dateEnd" onchange="handleDateChange()"></select>
        </div>
    </div>

    <div class="alignment-grid matchup-grid">
        <div class="alliance-select-panel">
            <span class="stat-label">COALITION_A</span>
            <select id="allianceStart" class="multi-select-box" multiple></select>
        </div>

        <div class="comparison-center-column">
            <div class="hero-delta-view">
                <div class="coalition-block">
                    <div class="stat-label">GROUP_A</div>
                    <div class="coalition-name" id="tagA">--</div>
                </div>
                <div class="vs-badge">VS</div>
                <div class="coalition-block">
                    <div class="stat-label">GROUP_B</div>
                    <div class="coalition-name" id="tagB">--</div>
                </div>
            </div>
            <div id="metricsDisplay" class="metric-comparison-list"></div>
        </div>

        <div class="alliance-select-panel">
            <span class="stat-label">COALITION_B</span>
            <select id="allianceEnd" class="multi-select-box" multiple></select>
        </div>
    </div>
</div>

<script>
    const POWER_THRESHOLD = 15000000;
    const metrics = {
        'highest_power': 'Highest Power',
        'merits': 'Merits',
        'units_killed': 'Total Kills',
        'killcount_t5': 'T5 Kills',
        'killcount_t4': 'T4 Kills',
        'killcount_t3': 'T3 Kills',
        'killcount_t2': 'T2 Kills',
        'killcount_t1': 'T1 Kills',
        'units_dead': 'Deads',
        'units_healed': 'Healed',
        'gold_spent': 'Gold Spent',
        'wood_spent': 'Wood Spent',
        'stone_spent': 'Stone Spent',
        'mana_spent': 'Mana Spent'
    };
    
    let fileDataCache = {}; 
    let masterAllianceMap = {}; 

    function parseToNum(val) {
        if (val === undefined || val === null || val === '-' || val === '') return 0;
        const clean = val.toString().replace(/[^0-9]/g, '');
        const num = parseInt(clean, 10);
        return isNaN(num) ? 0 : num;
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if (lines.length === 0) return [];
        
        const splitLine = (line) => {
            const result = [];
            let current = '';
            let inQuotes = false;
            for (let char of line) {
                if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else current += char;
            }
            result.push(current.trim());
            return result;
        };

        const headers = splitLine(lines[0]).map(h => h.toLowerCase().replace(/["\s]/g, ''));
        
        return lines.slice(1).map(line => {
            const cells = splitLine(line);
            const row = {};
            headers.forEach((h, i) => { 
                row[h] = cells[i] || ""; 
            });
            return row;
        });
    }

    async function scanFiles() {
        showLoader(true);
        try {
            const response = await fetch('data/files.json');
            const fileListData = await response.json();
            const foundFiles = fileListData.mainDataFiles;
            if (foundFiles.length === 0) return;

            const oldestFile = foundFiles[foundFiles.length-1];
            const masterRes = await fetch(oldestFile);
            const masterData = parseCSV(await masterRes.text());
            
            masterData.forEach(row => {
                if (row.home_server && row.alliance_tag && !masterAllianceMap[row.home_server]) {
                    masterAllianceMap[row.home_server] = row.alliance_tag;
                }
            });

            const sSelect = document.getElementById('dateStart');
            const eSelect = document.getElementById('dateEnd');
            
            foundFiles.forEach(file => {
                const opt = document.createElement('option');
                opt.value = file;
                opt.textContent = file.replace('.csv','').replace('data/','');
                sSelect.appendChild(opt.cloneNode(true));
                eSelect.appendChild(opt);
            });

            sSelect.selectedIndex = foundFiles.length - 1;
            eSelect.selectedIndex = 0;

            await handleDateChange();
        } catch (e) { console.error("Initialization Error:", e); }
        showLoader(false);
    }

    async function handleDateChange() {
        showLoader(true);
        const startFile = document.getElementById('dateStart').value;
        const endFile = document.getElementById('dateEnd').value;
        
        if (!fileDataCache[startFile]) {
            const res = await fetch(startFile);
            fileDataCache[startFile] = parseCSV(await res.text());
        }
        if (!fileDataCache[endFile]) {
            const res = await fetch(endFile);
            fileDataCache[endFile] = parseCSV(await res.text());
        }
        
        updateAllianceLists();
        showLoader(false);
    }

    function updateAllianceLists() {
        const sortedSIDs = Object.keys(masterAllianceMap).sort((a,b) => parseInt(a) - parseInt(b));
        ['allianceStart', 'allianceEnd'].forEach(id => {
            const select = document.getElementById(id);
            const savedSelections = Array.from(select.selectedOptions).map(o => o.value);
            select.innerHTML = '';
            sortedSIDs.forEach(sid => {
                const opt = document.createElement('option');
                opt.value = sid; 
                opt.textContent = `${masterAllianceMap[sid]} [${sid}]`;
                opt.setAttribute('data-tag', masterAllianceMap[sid]);
                if (savedSelections.includes(sid)) opt.selected = true;
                select.appendChild(opt);
            });
        });
        compareData();
    }

    function calculateCoalitionStats(selectedSIDs, startData, endData) {
        const sids = selectedSIDs.map(String);
        const startMap = new Map();
        startData.forEach(p => {
            if (sids.includes(String(p.home_server))) {
                startMap.set(p.lord_id, p);
            }
        });
        
        const results = {};
        Object.keys(metrics).forEach(k => results[k] = 0);

        endData.forEach(pEnd => {
            if (!sids.includes(String(pEnd.home_server))) return;

            const endPower = parseToNum(pEnd.highest_power);
            if (endPower < POWER_THRESHOLD) return;

            const pStart = startMap.get(pEnd.lord_id);

            Object.keys(metrics).forEach(mKey => {
                const eVal = parseToNum(pEnd[mKey]);
                if (mKey === 'highest_power') {
                    results[mKey] += eVal;
                } else {
                    const sVal = pStart ? parseToNum(pStart[mKey]) : 0;
                    results[mKey] += (eVal - sVal);
                }
            });
        });
        return results;
    }

    function compareData() {
        const sFile = document.getElementById('dateStart').value;
        const eFile = document.getElementById('dateEnd').value;
        const selA = Array.from(document.getElementById('allianceStart').selectedOptions).map(o => o.value);
        const selB = Array.from(document.getElementById('allianceEnd').selectedOptions).map(o => o.value);
        
        if (!selA.length || !selB.length) return;

        const dataStart = fileDataCache[sFile];
        const dataEnd = fileDataCache[eFile];

        const statsA = calculateCoalitionStats(selA, dataStart, dataEnd);
        const statsB = calculateCoalitionStats(selB, dataStart, dataEnd);
        
        document.getElementById('tagA').innerText = Array.from(document.getElementById('allianceStart').selectedOptions).map(o => o.getAttribute('data-tag')).join(' + ') || "GROUP_A";
        document.getElementById('tagB').innerText = Array.from(document.getElementById('allianceEnd').selectedOptions).map(o => o.getAttribute('data-tag')).join(' + ') || "GROUP_B";
        
        const container = document.getElementById('metricsDisplay');
        container.innerHTML = Object.entries(metrics).map(([key, label]) => {
            const valA = statsA[key];
            const valB = statsB[key];
            const diff = valA - valB;
            
            const arrowA = valA > valB ? `<span class="indicator-arrow positive">←</span>` : '';
            const arrowB = valB > valA ? `<span class="indicator-arrow negative">→</span>` : '';
            
            return `
                <div class="metric-row">
                    <div class="col-a">${Math.round(valA).toLocaleString()} ${arrowA}</div>
                    <div class="col-gap">
                        <span class="metric-label-style">${label}</span>
                        <span class="delta-value ${diff >= 0 ? 'positive' : 'negative'}">
                            ${(diff >= 0 ? '+' : '') + Math.round(diff).toLocaleString()}
                        </span>
                    </div>
                    <div class="col-b">${arrowB} ${Math.round(valB).toLocaleString()}</div>
                </div>`;
        }).join('');
    }

    function setupToggleLogic(selectId) {
        const select = document.getElementById(selectId);
        select.addEventListener('mousedown', function(e) {
            if (e.target.tagName === 'OPTION') {
                e.preventDefault(); 
                e.target.selected = !e.target.selected;
                compareData();
            }
        });
    }

    function showLoader(show) { 
        document.getElementById('globalLoader').style.display = show ? 'flex' : 'none'; 
    }
    
    window.onload = () => { 
        setupToggleLogic('allianceStart'); 
        setupToggleLogic('allianceEnd'); 
        scanFiles(); 
    };
</script>
</body>
</html>
