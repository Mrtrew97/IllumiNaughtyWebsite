<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matchup Analysis // KVK-DATA</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --main-width: 900px;
            --color-cyan: #22d3ee;
            --color-gold: #fbbf24;
            --color-title: #e2e8f0;
            --center-gap: 200px;
            --selector-width: 220px;
            --bg-color: #030005; 
            --card-bg: rgba(20, 10, 30, 0.6);
            --text-main: #ffffff;
            --text-dim: #9d8ba1;
            --accent-purple: #9333ea;
            --border-color: rgba(147, 51, 234, 0.15);
            --positive: #22c55e;
            --negative: #ef4444;
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color); 
            color: var(--text-main); 
            margin: 0;
            padding: 0;
            background-image: 
                radial-gradient(circle at 50% 100%, #150520 0%, transparent 60%),
                radial-gradient(circle at 50% -20%, #2a0a3a 0%, transparent 50%),
                radial-gradient(circle at 10% 80%, #1a0225 0%, transparent 30%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .app-container { padding: 30px; max-width: 1600px; margin: 0 auto; }

        .header-nav { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 25px; 
        }

        .exit-btn {
            color: var(--text-dim); 
            text-decoration: none; 
            font-weight: 900; 
            font-size: 0.65rem; 
            letter-spacing: 2px; 
            text-transform: uppercase;
            transition: all 0.3s ease;
            padding: 8px 16px;
            border: 1px solid transparent;
            border-radius: 6px;
            display: flex;
            align-items: center;
            background: transparent;
        }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr var(--center-gap) 1fr;
            max-width: var(--main-width);
            margin: 0 auto;
            align-items: center;
        }

        .primary-controls { 
            margin: 0 auto 30px auto;
            max-width: var(--main-width);
            background: rgba(147, 51, 234, 0.03); 
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px 0;
            box-sizing: border-box;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }

        .custom-select-wrapper { 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        .custom-select-wrapper select { 
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background: rgba(30, 10, 45, 0.8) !important; 
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 15px; 
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            font-size: 0.8rem; 
            font-weight: 800;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: background 0.2s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            width: var(--selector-width);
            text-align: center;
            font-family: 'Inter', sans-serif;
        }

        .custom-select-wrapper select option {
            background-color: #0f0518; 
            color: white;
            padding: 10px;
        }

        .custom-select-wrapper select:focus {
            background: rgba(45, 15, 65, 0.95) !important;
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(147, 51, 234, 0.3);
        }

        .custom-select-wrapper::after {
            content: ''; 
            width: 0; height: 0;
            border-left: 4px solid transparent; 
            border-right: 4px solid transparent;
            border-top: 5px solid var(--accent-purple);
            position: absolute; 
            right: 15px; 
            pointer-events: none; 
            opacity: 0.8;
        }

        .date-control-item { display: flex; width: 100%; justify-content: center; }

        .versus-divider {
            text-align: center;
            font-family: 'Inter', sans-serif;
            font-weight: 900;
            font-style: italic;
            font-size: 1.2rem;
            color: var(--accent-purple);
            opacity: 0.6;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(147, 51, 234, 0.4);
        }
        
        .matchup-grid { 
            margin: 0 auto 25px auto;
            max-width: var(--main-width);
        }
        
        .alliance-select-panel { 
            background: var(--card-bg);
            border: 1px solid var(--border-color); 
            border-radius: 16px; 
            padding: 20px; 
            backdrop-filter: blur(10px); 
            box-sizing: border-box;
            text-align: center;
        }
        
        .multi-select-box { 
            width: 100%; height: 180px; background: rgba(0, 0, 0, 0.3); 
            border: 1px solid var(--border-color); border-radius: 12px; 
            color: var(--text-main); font-family: 'Inter', sans-serif; 
            font-size: 0.8rem; margin-top: 12px; outline: none !important; padding: 8px;
            scrollbar-width: thin; scrollbar-color: var(--accent-purple) transparent;
            overflow-y: auto;
            appearance: none;
            text-align: center;
        }
        
        .multi-select-box:focus { border: 1px solid var(--accent-purple); }
        .multi-select-box option { 
            padding: 10px; 
            border-radius: 6px; 
            margin-bottom: 2px; 
            cursor: pointer; 
            color: var(--text-dim); 
            background: transparent;
            text-align: center;
        }
        .multi-select-box option:checked { 
            background: linear-gradient(90deg, rgba(147, 51, 234, 0.8) 0%, rgba(147, 51, 234, 0.4) 100%) !important; 
            color: white !important; 
        }
        
        .sticky-comparison-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            padding-top: 10px;
            background: transparent;
        }
        .hero-delta-view { 
            background: linear-gradient(180deg, rgba(147, 51, 234, 0.1) 0%, rgba(20, 10, 30, 0.85) 100%); 
            border: 1px solid var(--border-color); 
            border-radius: 24px 24px 0 0; 
            padding: 30px 0; 
            margin: 0 auto; 
            max-width: var(--main-width);
            width: 100%;
            box-sizing: border-box;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(147, 51, 234, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        .coalition-block { width: 100%; text-align: center; }
        .coalition-name { 
            font-size: 1.6rem; 
            font-weight: 900; 
            letter-spacing: -1px; 
            margin-top: 10px; 
            text-transform: uppercase;
        }
        #tagA { color: var(--color-cyan); }
        #tagB { color: var(--color-gold); }
        
        .vs-badge { 
            font-weight: 900; 
            color: var(--accent-purple); 
            opacity: 0.7; 
            font-size: 0.65rem; 
            letter-spacing: 4px; 
            text-transform: uppercase;
            text-align: center;
        }

        .metric-comparison-list {
            max-width: var(--main-width);
            margin: 0 auto 50px auto;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-top: none; 
            border-radius: 0 0 24px 24px;
            overflow: hidden;
        }
        .metric-row {
            display: grid;
            grid-template-columns: 1fr var(--center-gap) 1fr;
            align-items: center;
            padding: 25px 0;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .col-a { text-align: center; font-size: 1.3rem; color: var(--color-cyan); font-weight: 800; }
        .col-gap { text-align: center; display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .col-b { text-align: center; font-size: 1.3rem; color: var(--color-gold); font-weight: 800; }
        .metric-label-style { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dim); }
        .delta-value { font-weight: 900; font-size: 0.95rem; }
        
        .stat-label { font-size: 0.75rem; color: #d1cada; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; }
        .loading-overlay { position: fixed; inset: 0; background: rgba(3,0,5,0.98); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(10px); }
        .loading-text { color: var(--accent-purple); font-weight: 900; letter-spacing: 5px; font-size: 0.7rem; }
    </style>
</head>
<body>
<div class="loading-overlay" id="globalLoader">
    <div class="loading-text">DEBUG_MODE_ACTIVE</div>
</div>
<div class="app-container">
    <header class="header-nav">
        <a href="index.html" class="exit-btn">← SYSTEM_RETURN</a>
        <div style="text-align: right;">
            <div class="stat-label" id="namingSourceLabel">Syncing file dates...</div>
            <h1 style="margin:0; font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; text-transform: uppercase;">MATCHUP_ANALYSIS</h1>
        </div>
    </header>
    
    <div class="layout-grid primary-controls">
        <div class="date-control-item">
            <div class="custom-select-wrapper">
                <select id="dateStart" onchange="handleDateChange()"></select>
            </div>
        </div>
        <div class="vs-badge">TO</div>
        <div class="date-control-item">
            <div class="custom-select-wrapper">
                <select id="dateEnd" onchange="handleDateChange()"></select>
            </div>
        </div>
    </div>

    <div class="layout-grid matchup-grid">
        <div class="alliance-select-panel">
            <span class="stat-label">COALITION_A</span>
            <select id="allianceStart" class="multi-select-box" multiple></select>
        </div>
        <div class="versus-divider">VS</div>
        <div class="alliance-select-panel">
            <span class="stat-label">COALITION_B</span>
            <select id="allianceEnd" class="multi-select-box" multiple></select>
        </div>
    </div>

    <div class="sticky-comparison-header">
        <div class="layout-grid hero-delta-view">
            <div class="coalition-block">
                <div class="stat-label">GROUP_A</div>
                <div class="coalition-name" id="tagA">--</div>
            </div>
            <div class="vs-badge">Group_A - Group_B</div>
            <div class="coalition-block">
                <div class="stat-label">GROUP_B</div>
                <div class="coalition-name" id="tagB">--</div>
            </div>
        </div>
    </div>
    <div id="metricsDisplay" class="metric-comparison-list"></div>
</div>
<script>
    const POWER_THRESHOLD = 35000000;
    const metrics = {
        'highest_power': 'Highest Power', 'merits': 'Merits', 'units_killed': 'Total Kills',
        'killcount_t5': 'T5 Kills', 'killcount_t4': 'T4 Kills', 'killcount_t3': 'T3 Kills',
        'killcount_t2': 'T2 Kills', 'killcount_t1': 'T1 Kills', 'units_dead': 'Deads',
        'units_healed': 'Healed', 'gold_spent': 'Gold Spent', 'wood_spent': 'Wood Spent',
        'stone_spent': 'Stone Spent', 'mana_spent': 'Mana Spent'
    };
    let fileDataCache = {}; 
    let masterAllianceMap = {}; 
    let fileListData = {};

    function parseToNum(val) {
        if (!val || val === '-') return 0;
        const clean = val.toString().replace(/[^0-9]/g, '');
        return parseInt(clean, 10) || 0;
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if (lines.length === 0) return [];
        const headers = lines[0].split(',').map(h => h.toLowerCase().replace(/["\s]/g, ''));
        return lines.slice(1).map(line => {
            const cells = line.split(',');
            const row = {};
            headers.forEach((h, i) => { row[h] = cells[i] ? cells[i].replace(/^"|"$/g, '').trim() : ""; });
            return row;
        });
    }

    function dateFromFilename(name) {
        const parts = name.replace('.csv', '').split('-');
        if (parts.length !== 3) return new Date(0);
        return new Date(parts[2], parts[1] - 1, parts[0]);
    }

    async function scanFiles() {
        showLoader(true);
        try {
            const response = await fetch('data/files.json');
            if (!response.ok) throw new Error('Could not load files.json');
            
            fileListData = await response.json();
            const foundFiles = fileListData.mainDataFiles;

            if (foundFiles.length === 0) return;

            const oldestFile = foundFiles[foundFiles.length-1];
            const masterRes = await fetch(oldestFile);
            const masterData = parseCSV(await masterRes.text());
            
            masterData.forEach(row => {
                const sID = row.home_server;
                const tag = row.alliance_tag;
                if (sID && tag && !masterAllianceMap[sID]) {
                    masterAllianceMap[sID] = tag;
                }
            });

            document.getElementById('namingSourceLabel').innerText = `Names: ${oldestFile.replace('.csv','')}`;

            const sSelect = document.getElementById('dateStart');
            const eSelect = document.getElementById('dateEnd');
            
            foundFiles.forEach(file => {
                const opt = document.createElement('option');
                opt.value = file;
                opt.textContent = file.replace('.csv','').replace('data/','');
                sSelect.appendChild(opt.cloneNode(true));
                eSelect.appendChild(opt);
            });

            await handleDateChange();
        } catch (e) { console.error(e); }
        showLoader(false);
    }

    function setupToggleLogic(selectId) {
        const select = document.getElementById(selectId);
        select.addEventListener('mousedown', function(e) {
            e.preventDefault(); 
            const option = e.target;
            if (option.tagName === 'OPTION') {
                const scrollPos = this.scrollTop;
                option.selected = !option.selected;
                setTimeout(() => {
                    this.focus({preventScroll: true});
                    this.scrollTop = scrollPos;
                }, 0);
                compareData();
            }
        });
    }

    async function handleDateChange() {
        const startFile = document.getElementById('dateStart').value;
        const endFile = document.getElementById('dateEnd').value;
        if (!fileDataCache[startFile]) {
            const resS = await fetch(startFile);
            fileDataCache[startFile] = parseCSV(await resS.text());
        }
        if (!fileDataCache[endFile]) {
            const resE = await fetch(endFile);
            fileDataCache[endFile] = parseCSV(await resE.text());
        }
        updateAllianceLists();
    }

    function updateAllianceLists() {
        const sortedSIDs = Object.keys(masterAllianceMap).sort((a,b) => a - b);
        ['allianceStart', 'allianceEnd'].forEach(id => {
            const select = document.getElementById(id);
            const savedSelections = Array.from(select.selectedOptions).map(o => o.value);
            select.innerHTML = '';
            sortedSIDs.forEach(sid => {
                const opt = document.createElement('option');
                opt.value = sid; 
                opt.textContent = `${masterAllianceMap[sid]} [${sid}]`;
                opt.setAttribute('data-tag', masterAllianceMap[sid]);
                if (savedSelections.includes(sid)) opt.selected = true;
                select.appendChild(opt);
            });
        });
        compareData();
    }

    function calculateHybrid(selectedSIDs, startData, endData) {
        const startMap = new Map(startData.filter(r => selectedSIDs.includes(r.home_server)).map(p => [p.lord_id, p]));
        const endMap = new Map(endData.filter(r => selectedSIDs.includes(r.home_server)).map(p => [p.lord_id, p]));
        const allIds = new Set([...startMap.keys(), ...endMap.keys()]);
        const results = {};
        Object.keys(metrics).forEach(k => results[k] = 0);
        allIds.forEach(id => {
            const pStart = startMap.get(id) || {};
            const pEnd = endMap.get(id) || {};
            const power = Math.max(parseToNum(pStart.highest_power), parseToNum(pEnd.highest_power));
            if (power < POWER_THRESHOLD) return;
            Object.keys(metrics).forEach(mKey => {
                const sVal = parseToNum(pStart[mKey]);
                const eVal = parseToNum(pEnd[mKey]);
                results[mKey] += (mKey === 'highest_power') ? eVal : (eVal - sVal);
            });
        });
        return results;
    }

    function compareData() {
        const sF = document.getElementById('dateStart').value;
        const eF = document.getElementById('dateEnd').value;
        const sSel = Array.from(document.getElementById('allianceStart').selectedOptions);
        const eSel = Array.from(document.getElementById('allianceEnd').selectedOptions);
        if (!sSel.length || !eSel.length || !fileDataCache[sF] || !fileDataCache[eF]) {
            document.getElementById('tagA').innerText = "--";
            document.getElementById('tagB').innerText = "--";
            document.getElementById('metricsDisplay').innerHTML = "";
            return;
        }
        const groupA = calculateHybrid(sSel.map(o => o.value), fileDataCache[sF], fileDataCache[eF]);
        const groupB = calculateHybrid(eSel.map(o => o.value), fileDataCache[sF], fileDataCache[eF]);
        document.getElementById('tagA').innerText = sSel.map(o => o.getAttribute('data-tag')).join(' + ');
        document.getElementById('tagB').innerText = eSel.map(o => o.getAttribute('data-tag')).join(' + ');
        const container = document.getElementById('metricsDisplay');
        container.innerHTML = Object.entries(metrics).map(([key, label]) => {
            const diff = groupA[key] - groupB[key];
            return `<div class="metric-row">
                    <div class="col-a">${Math.round(groupA[key]).toLocaleString()}</div>
                    <div class="col-gap">
                        <span class="metric-label-style">${label}</span>
                        <span class="delta-value ${diff >= 0 ? 'positive' : 'negative'}">
                            ${(diff >= 0 ? '+' : '') + Math.round(diff).toLocaleString()}
                        </span>
                    </div>
                    <div class="col-b">${Math.round(groupB[key]).toLocaleString()}</div>
                </div>`;
        }).join('');
    }

    function showLoader(show) { document.getElementById('globalLoader').style.display = show ? 'flex' : 'none'; }
    
    function init() {
        setupToggleLogic('allianceStart');
        setupToggleLogic('allianceEnd');
        scanFiles();
    }

    window.onload = init;
</script>
</body>
</html>
