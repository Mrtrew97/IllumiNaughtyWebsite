<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Core // DRILLDOWN_V5</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="loading-overlay" id="loader">
    <div class="loading-text">INITIALIZING_CORE_SYSTEM...</div>
</div>

<div class="app-container">
    <div class="header-nav" id="headerNav">
        <div id="navActionContainer">
            <button class="exit-btn" onclick="window.location.href='index.html'">← SYSTEM_RETURN</button>
        </div>
        <div id="subjectCount" style="font-size: 0.75rem; font-weight: 900; color: var(--accent-purple); letter-spacing: 2px;">ACTIVE_SUBJECTS // --</div>
    </div>

    <div class="sticky-wrapper" id="controlsWrapper">
        <div class="primary-controls">
            <div class="custom-select-wrapper">
                <select id="seasonFolder" onchange="handleFolderChange()">
                    <option value="">-- SELECT DATA FOLDER --</option>
                    <option value="ALL_KVKS">★ ALL KVKS</option>
                </select>
            </div>
            <input type="text" id="playerSearch" class="search-box" placeholder="SEARCH_LORDS_BY_ID_OR_NAME..." oninput="renderDisplay()">
        </div>
        <div class="metric-bar" id="metricBar"></div>
    </div>

    <div class="player-grid" id="mainGrid"></div>
</div>

<script>
    const BASE_PATH = "IData/"; 
    const POWER_FLOOR = 35000000;
    const MIN_SHEETS = 2; 
    const targetServers = ["167", "509"];
    let weeklyData = {};
    let currentSortMetric = 'highest_power';
    let fileListData = {};
    let isAllKvksMode = false;
    let selectedPlayerId = null;

    const metrics = {
        'highest_power': 'HIGHEST POWER',
        'merits': 'MERITS',
        'units_killed': 'TOTAL KILLS',
        'killcount_t5': 'T5 KILLS',
        'killcount_t4': 'T4 KILLS',
        'killcount_t3': 'T3 KILLS',
        'killcount_t2': 'T2 KILLS',
        'killcount_t1': 'T1 KILLS',
        'units_dead': 'DEADS',
        'units_healed': 'HEALED',
        'gold_spent': 'GOLD SPENT',
        'wood_spent': 'WOOD SPENT',
        'stone_spent': 'STONE SPENT',
        'mana_spent': 'MANA SPENT'
    };

    function cleanName(raw) {
        if (raw === "ALL_KVKS") return "★ ALL KVKS";
        return raw.replace(/^\d+\s*-\s*/, '');
    }

    async function init() {
        createMetricButtons();
        try {
            const res = await fetch('data/files.json');
            if (!res.ok) throw new Error('Could not load files.json');
            
            fileListData = await res.json();

            const selector = document.getElementById('seasonFolder');
            fileListData.iDataFolders.forEach(folder => {
                const opt = document.createElement('option');
                opt.value = folder.name;
                opt.textContent = cleanName(folder.name);
                selector.appendChild(opt);
            });

            selector.value = "ALL_KVKS";
            handleFolderChange();

        } catch(e) { console.error("Init failed", e); }
    }

    function createMetricButtons() {
        const bar = document.getElementById('metricBar');
        bar.innerHTML = "";
        Object.entries(metrics).forEach(([key, label]) => {
            const btn = document.createElement('button');
            btn.className = `metric-btn ${key === currentSortMetric ? 'active' : ''}`;
            btn.textContent = label;
            btn.onclick = () => {
                document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentSortMetric = key;
                renderDisplay();
            };
            bar.appendChild(btn);
        });
    }

    async function handleFolderChange() {
        const val = document.getElementById('seasonFolder').value;
        if (!val) return;
        document.getElementById('loader').style.display = 'flex';
        weeklyData = {}; 
        isAllKvksMode = (val === 'ALL_KVKS');
        
        try {
            if (isAllKvksMode) await loadDynamicAllKvks();
            else await loadSingleFolder(val);
        } catch (e) { console.error("Load Error:", e); }
        
        document.getElementById('loader').style.display = 'none';
        renderDisplay();
    }

    async function loadDynamicAllKvks() {
        const latestFolder = fileListData.iDataFolders[fileListData.iDataFolders.length - 1];
        const latestFiles = latestFolder.files;
        // Fix: Case-correction for KVK -> KvK to match Repo folders
        const fixedFolderName = latestFolder.name.replace('KVK', 'KvK');
        const latestPath = BASE_PATH + fixedFolderName + "/" + latestFiles[latestFiles.length - 1];
        
        const latestResp = await fetch(latestPath);
        if (!latestResp.ok) return;
        const latestSheetData = parseCSV(await latestResp.text());
        const activeIds = Object.keys(latestSheetData).filter(id => parseInt(latestSheetData[id].highest_power) >= POWER_FLOOR);

        for (const folderMeta of fileListData.iDataFolders) {
            const folderName = folderMeta.name.replace('KVK', 'KvK');
            const files = folderMeta.files;
            if (files.length < 2) continue;

            const folderURL = BASE_PATH + folderName + "/";
            const firstFile = folderURL + files[0];
            const lastFile = folderURL + files[files.length - 1];

            const [respOld, respNew] = await Promise.all([fetch(firstFile), fetch(lastFile)]);
            if (!respOld.ok || !respNew.ok) continue;

            const [textOld, textNew] = await Promise.all([respOld.text(), respNew.text()]);
            const dataOld = parseCSV(textOld);
            const dataNew = parseCSV(textNew);

            activeIds.forEach(id => {
                if (!weeklyData[id]) { 
                    weeklyData[id] = { starts: [], ends: [], timeline: [], latestStats: latestSheetData[id], sheetCount: 0 }; 
                }
                if (dataOld[id]) {
                    let e = { label: files[0].replace('.csv','') };
                    Object.keys(metrics).forEach(m => e[m] = parseInt(dataOld[id][m]) || 0);
                    weeklyData[id].starts.push(e);
                    weeklyData[id].sheetCount++;
                }
                if (dataNew[id]) {
                    let e = { label: files[files.length - 1].replace('.csv','') };
                    Object.keys(metrics).forEach(m => e[m] = parseInt(dataNew[id][m]) || 0);
                    weeklyData[id].ends.push(e);
                    weeklyData[id].timeline.push(e);
                    weeklyData[id].sheetCount++;
                }
            });
        }
    }

    async function loadSingleFolder(folderName) {
        const folderMeta = fileListData.iDataFolders.find(f => f.name === folderName);
        if (!folderMeta) return;

        const files = folderMeta.files;
        // Fix: Case-correction for KVK -> KvK to match Repo folders
        const fixedFolder = folderName.replace('KVK', 'KvK');
        const pathPrefix = BASE_PATH + fixedFolder + "/";
        
        const latestResp = await fetch(pathPrefix + files[files.length - 1]);
        if (!latestResp.ok) return;
        const latestData = parseCSV(await latestResp.text());
        const activeIds = Object.keys(latestData).filter(id => parseInt(latestData[id].highest_power) >= POWER_FLOOR);

        for (const f of files) {
            const r = await fetch(pathPrefix + f);
            if (!r.ok) continue;
            const d = parseCSV(await r.text());
            activeIds.forEach(id => {
                if (!d[id]) return;
                if (!weeklyData[id]) { 
                    weeklyData[id] = { starts: [], ends: [], timeline: [], latestStats: latestData[id], sheetCount: 0 }; 
                }
                let e = { label: f.replace('.csv','') };
                Object.keys(metrics).forEach(m => e[m] = parseInt(d[id][m]) || 0);
                weeklyData[id].timeline.push(e);
                weeklyData[id].sheetCount++;
                if (f === files[0]) weeklyData[id].starts.push(e);
                if (f === files[files.length-1]) weeklyData[id].ends.push(e);
            });
        }
    }

    function renderDisplay() {
        const grid = document.getElementById('mainGrid');
        const controls = document.getElementById('controlsWrapper');
        const navContainer = document.getElementById('navActionContainer');
        const query = document.getElementById('playerSearch').value.toLowerCase();
        
        document.querySelectorAll('canvas').forEach(canvas => {
            const chart = Chart.getChart(canvas);
            if (chart) chart.destroy();
        });

        grid.innerHTML = "";

        if (selectedPlayerId && weeklyData[selectedPlayerId]) {
            controls.style.display = 'none';
            navContainer.innerHTML = `<button class="exit-btn" onclick="exitSoloMode()">← TERMINATE_VIEW</button>`;
            renderSoloMode(selectedPlayerId);
            return;
        }

        navContainer.innerHTML = `<button class="exit-btn" onclick="window.location.href='index.html'">← SYSTEM_RETURN</button>`;
        controls.style.display = 'block';
        
        const filtered = Object.values(weeklyData).filter(p => p.sheetCount >= MIN_SHEETS);

        const sorted = filtered.sort((a, b) => {
            const valA = (a.timeline?.length > 0) ? a.timeline[a.timeline.length - 1][currentSortMetric] : 0;
            const valB = (b.timeline?.length > 0) ? b.timeline[b.timeline.length - 1][currentSortMetric] : 0;
            if (valB !== valA) return valB - valA;
            return b.sheetCount - a.sheetCount;
        });

        document.getElementById('subjectCount').textContent = `ACTIVE_SUBJECTS // ${sorted.length}`;

        sorted.forEach((data, index) => {
            const lordId = data.latestStats.lord_id || data.latestStats.id;
            const lordName = data.latestStats.name;
            if (query && !lordName.toLowerCase().includes(query) && !lordId.toLowerCase().includes(query)) return;
            
            const rank = index + 1;
            let rBannerClass = rank <= 3 ? `rank-${rank}-banner` : 'rank-std-banner';
            let glowClass = rank <= 3 ? `glow-${rank}` : 'glow-purple';
            
            const card = document.createElement('div');
            card.className = `growth-card ${glowClass}`;
            card.onclick = () => { selectedPlayerId = lordId; renderDisplay(); };
            
            const currentVal = data.timeline[data.timeline.length - 1][currentSortMetric] || 0;
            let delta = 0;
            let deltaContext = "";

            if (isAllKvksMode) {
                const newestEnd = data.ends[data.ends.length - 1][currentSortMetric] || 0;
                const prevEnd = data.ends.length > 1 ? (data.ends[data.ends.length - 2][currentSortMetric] || 0) : 0;
                delta = newestEnd - prevEnd;
                deltaContext = "compared to end of last KVK";
            } else {
                const last = data.timeline[data.timeline.length - 1][currentSortMetric] || 0;
                const first = data.timeline[0][currentSortMetric] || 0;
                delta = last - first;
                deltaContext = "since start of KVK";
            }

            card.innerHTML = `
                <div class="rank-banner ${rBannerClass}">#${rank}</div>
                <div>
                    <h3 style="margin:0; font-size:1.6rem; color:var(--text-title);">${lordName}</h3>
                    <div style="font-size:0.65rem; color:var(--text-dim); font-weight:900; margin-top:4px;">ID: ${lordId}</div>
                </div>
                <div style="margin:20px 0;">
                    <div class="stat-value" style="font-size:1.4rem;">${currentVal.toLocaleString()}</div>
                    <div class="stat-label">${metrics[currentSortMetric]}</div>
                </div>
                <div style="font-weight:900; font-size:0.75rem;" class="${delta >= 0 ? 'positive' : 'negative'}">
                    ${delta >= 0 ? '▲' : '▼'} ${Math.abs(delta).toLocaleString()} ${deltaContext}
                </div>
                <div class="chart-container"><canvas id="chart-${lordId}"></canvas></div>
            `;
            grid.appendChild(card);
            createChart(`chart-${lordId}`, data, currentSortMetric);
        });
    }

    function renderSoloMode(id) {
        const grid = document.getElementById('mainGrid');
        const data = weeklyData[id];
        
        const header = document.createElement('div');
        header.className = 'solo-header';
        header.innerHTML = `
            <div>
                <div class="stat-label">SUBJECT_ANALYSIS</div>
                <h2 style="font-size:3rem; margin:10px 0; color:var(--text-title);">${data.latestStats.name}</h2>
                <div class="stat-label">SUBJECT_ID: ${id}</div>
            </div>
        `;
        grid.appendChild(header);

        Object.keys(metrics).forEach(mKey => {
            const miniCard = document.createElement('div');
            miniCard.className = "growth-card";
            miniCard.style.cursor = "default";
            
            let graphTimeline = (isAllKvksMode) ? data.ends : data.timeline;
            const curVal = graphTimeline[graphTimeline.length - 1][mKey] || 0;
            
            let delta = 0;
            let deltaContext = "";

            if (isAllKvksMode) {
                const last = graphTimeline[graphTimeline.length - 1][mKey] || 0;
                const prev = graphTimeline.length > 1 ? (graphTimeline[graphTimeline.length - 2][mKey] || 0) : 0;
                delta = last - prev;
                deltaContext = "compared to end of last KVK";
            } else {
                const last = graphTimeline[graphTimeline.length - 1][mKey] || 0;
                const first = graphTimeline[0] ? (graphTimeline[0][mKey] || 0) : 0;
                delta = last - first;
                deltaContext = "since start of KVK";
            }

            miniCard.innerHTML = `
                <div class="stat-label">${metrics[mKey]}</div>
                <div class="stat-value" style="font-size:1.8rem;">${curVal.toLocaleString()}</div>
                <div class="${delta >= 0 ? 'positive' : 'negative'}" style="font-weight:900; font-size:0.75rem; margin-top:5px;">
                    ${delta >= 0 ? '▲' : '▼'} ${Math.abs(delta).toLocaleString()} ${deltaContext}
                </div>
                <div style="height:120px; margin-top:15px;"><canvas id="solo-${mKey}"></canvas></div>
            `;
            grid.appendChild(miniCard);
            createChart(`solo-${mKey}`, data, mKey);
        });
    }

    function exitSoloMode() {
        selectedPlayerId = null;
        renderDisplay();
    }

    function createChart(canvasId, data, metricKey) {
        const el = document.getElementById(canvasId);
        if(!el) return;
        const ctx = el.getContext('2d');
        let graphTimeline = (isAllKvksMode) ? data.ends : data.timeline;

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: (graphTimeline || []).map(t => t.label),
                datasets: [{
                    data: (graphTimeline || []).map(t => t[metricKey]),
                    borderColor: '#9333ea', pointRadius: 2, pointBackgroundColor: '#9333ea', tension: 0.3, fill: false, borderWidth: 2
                }]
            },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { 
                    x: { ticks: { color: '#9d8ba1', font: { size: 9, weight: 'bold' }, maxRotation: 45 }, grid: { display: false } }, 
                    y: { display: false } 
                } 
            }
        });
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if (lines.length < 2) return {};
        const headers = lines[0].toLowerCase().split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        const result = {};
        lines.slice(1).forEach(line => {
            const cells = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
            const row = {}; 
            headers.forEach((h, i) => row[h] = cells[i]);
            if (targetServers.includes(row.home_server || row.server)) result[row.lord_id || row.id] = row;
        });
        return result;
    }

    window.onload = init;
</script>
</body>
</html>
