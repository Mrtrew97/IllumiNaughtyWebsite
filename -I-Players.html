<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intelligence Core // DRILLDOWN_V8.1</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .app-container { position: relative; z-index: 1; }
        .sticky-wrapper {
            position: sticky; top: 0; z-index: 999; padding: 10px 0 20px 0;
            background: transparent; backdrop-filter: blur(12px) saturate(150%);
            -webkit-backdrop-filter: blur(12px) saturate(150%);
        }
        .primary-controls { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; margin-bottom: 20px; }
        .view-toggle-container {
            display: flex; align-items: center; background: rgba(255, 255, 255, 0.05);
            border-radius: 50px; padding: 4px; height: 34px; width: fit-content;
            position: relative; border: 1px solid rgba(147, 51, 234, 0.3);
        }
        .toggle-btn {
            background: transparent; border: none; color: #ffffff !important; 
            padding: 0 18px; height: 100%; font-size: 0.65rem; font-weight: 900;
            cursor: pointer; letter-spacing: 1.5px; transition: all 0.3s ease;
            position: relative; z-index: 2; text-transform: uppercase;
        }
        .pill-slider {
            position: absolute; background: var(--accent-purple); height: calc(100% - 8px);
            top: 4px; left: 4px; border-radius: 50px; transition: all 0.3s ease;
            z-index: 1; box-shadow: 0 0 15px rgba(147, 51, 234, 0.4);
        }
        .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; padding: 40px 0; }
        .growth-card { position: relative; z-index: 10; transition: transform 0.3s ease; cursor: pointer; }
        .growth-card:hover { transform: translateY(-8px); }
        .metric-bar { display: flex; gap: 6px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .solo-header { grid-column: 1 / -1; padding: 40px 0; text-align: center; }
        .solo-header h2 { font-size: 3.5rem; color: var(--text-title); font-weight: 900; }
        .chart-container { height: 160px; margin-top: 15px; }
        .stat-label { font-size: 0.65rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
        .stat-value { font-family: 'Courier New', monospace; font-weight: 900; color: #fff; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loader"><div class="loading-text">UNIFYING_LOGIC_STREAM...</div></div>

<div class="app-container">
    <div class="header-nav">
        <div id="navActionContainer">
            <button class="exit-btn" onclick="window.location.href='index.html'">← SYSTEM_RETURN</button>
        </div>
        <div id="subjectCount" style="font-size: 0.75rem; font-weight: 900; color: var(--accent-purple);">ACTIVE_MEMBERS // --</div>
    </div>

    <div id="drilldownContent">
        <div class="sticky-wrapper" id="controlsWrapper">
            <div class="primary-controls">
                <select id="seasonFolder" class="custom-select" onchange="handleFolderChange()">
                    <option value="ALL_KVKS">★ ALL KVKS</option>
                </select>
                <input type="text" id="playerSearch" class="search-box" placeholder="SEARCH_LORDS..." oninput="renderDisplay()">
                
                <div class="view-toggle-container" id="toggleWrapper">
                    <div id="pill-bg" class="pill-slider"></div>
                    <button id="mode-total" class="toggle-btn" onclick="setMode('total')">TOTAL</button>
                    <button id="mode-growth" class="toggle-btn" onclick="setMode('growth')">GROWTH</button>
                </div>
            </div>
            <div class="metric-bar" id="metricBar"></div>
        </div>
        <div class="player-grid" id="mainGrid"></div>
    </div>
</div>

<script>
    const BASE_PATH = "IData/";
    const targetServers = ["167", "509"];
    let weeklyData = {};
    let currentSortMetric = 'highest_power';
    let currentViewMode = 'total'; 
    let selectedPlayerId = null;

    const metrics = {
        'highest_power': 'HIGHEST POWER', 'merits': 'MERITS', 'units_killed': 'TOTAL KILLS',
        'killcount_t5': 'T5 KILLS', 'killcount_t4': 'T4 KILLS', 'killcount_t3': 'T3 KILLS',
        'killcount_t2': 'T2 KILLS', 'killcount_t1': 'T1 KILLS', 'units_dead': 'DEADS',
        'units_healed': 'HEALED', 'gold_spent': 'GOLD SPENT', 'wood_spent': 'WOOD SPENT',
        'stone_spent': 'STONE SPENT', 'mana_spent': 'MANA SPENT'
    };

    function setMode(mode) {
        currentViewMode = mode;
        const pill = document.getElementById('pill-bg');
        const btn = document.getElementById(mode === 'total' ? 'mode-total' : 'mode-growth');
        pill.style.width = btn.offsetWidth + "px";
        pill.style.left = btn.offsetLeft + "px";
        renderDisplay();
    }

    async function init() {
        const bar = document.getElementById('metricBar');
        Object.entries(metrics).forEach(([key, label]) => {
            const btn = document.createElement('button');
            btn.className = `metric-btn ${key === currentSortMetric ? 'active' : ''}`;
            btn.textContent = label;
            btn.onclick = () => {
                document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active'); currentSortMetric = key; renderDisplay();
            };
            bar.appendChild(btn);
        });

        const res = await fetch('data/files.json');
        const fileListData = await res.json();
        const folders = fileListData.iDataFolders;

        for (const folder of folders) {
            const fName = folder.name.replace('KVK', 'KvK');
            const files = folder.files;
            const [r1, r2] = await Promise.all([fetch(BASE_PATH+fName+"/"+files[0]), fetch(BASE_PATH+fName+"/"+files[files.length-1])]);
            const [d1, d2] = [parseCSV(await r1.text()), parseCSV(await r2.text())];

            Object.keys(d2).forEach(id => {
                if (!weeklyData[id]) weeklyData[id] = { name: d2[id].name, timeline: [], growth: [] };
                const endVal = d2[id];
                const startVal = d1[id] || d2[id]; 
                
                let kvkGrowth = { label: fName };
                let kvkTotal = { label: fName };
                
                Object.keys(metrics).forEach(m => {
                    kvkTotal[m] = parseInt(endVal[m]) || 0;
                    kvkGrowth[m] = (parseInt(endVal[m]) || 0) - (parseInt(startVal[m]) || 0);
                });
                
                weeklyData[id].timeline.push(kvkTotal);
                weeklyData[id].growth.push(kvkGrowth);
            });
        }
        setMode('total');
        document.getElementById('loader').style.display = 'none';
    }

    function renderDisplay() {
        const grid = document.getElementById('mainGrid');
        const query = document.getElementById('playerSearch').value.toLowerCase();
        grid.innerHTML = "";
        
        if (selectedPlayerId) { return renderSoloMode(selectedPlayerId); }

        const isGrowth = currentViewMode === 'growth';
        
        const sorted = Object.entries(weeklyData).filter(([id, data]) => {
            return !query || data.name.toLowerCase().includes(query) || id.includes(query);
        }).sort((a, b) => {
            const dataA = isGrowth ? a[1].growth : a[1].timeline;
            const dataB = isGrowth ? b[1].growth : b[1].timeline;
            return (dataB[dataB.length-1][currentSortMetric] || 0) - (dataA[dataA.length-1][currentSortMetric] || 0);
        });

        document.getElementById('subjectCount').textContent = `ACTIVE_MEMBERS // ${sorted.length}`;

        sorted.forEach(([id, data], index) => {
            const activeSet = isGrowth ? data.growth : data.timeline;
            const lastEntry = activeSet[activeSet.length - 1];
            const displayVal = lastEntry[currentSortMetric];
            
            // UNIFIED LABELING: [METRIC] + [TYPE]
            const labelSuffix = isGrowth ? " IN LAST KVK" : "";
            const finalLabel = metrics[currentSortMetric] + labelSuffix;

            const card = document.createElement('div');
            card.className = "growth-card glow-purple";
            card.onclick = () => { selectedPlayerId = id; renderDisplay(); };
            card.innerHTML = `
                <div class="rank-banner">#${index+1}</div>
                <h3 style="margin:0; color:var(--text-title);">${data.name}</h3>
                <div style="font-size:0.6rem; color:var(--text-dim);">ID: ${id}</div>
                <div style="margin:20px 0;">
                    <div class="stat-label" style="color:var(--accent-purple);">${finalLabel}</div>
                    <div class="stat-value" style="font-size:1.4rem;">${displayVal.toLocaleString()}</div>
                </div>
                <div class="chart-container"><canvas id="chart-${id}"></canvas></div>
            `;
            grid.appendChild(card);
            
            new Chart(document.getElementById(`chart-${id}`), {
                type: 'line',
                data: {
                    labels: activeSet.map(t => t.label),
                    datasets: [{ data: activeSet.map(t => t[currentSortMetric]), borderColor: '#9333ea', tension: 0.3, fill: false, pointRadius: 2 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
            });
        });
    }

    function renderSoloMode(id) {
        const grid = document.getElementById('mainGrid');
        const data = weeklyData[id];
        const isGrowth = currentViewMode === 'growth';

        const header = document.createElement('div');
        header.className = 'solo-header';
        header.innerHTML = `
            <button class="exit-btn" onclick="selectedPlayerId=null; renderDisplay();">← RETURN_TO_GRID</button>
            <h2>${data.name}</h2>
            <div class="stat-label">ID: ${id}</div>
        `;
        grid.appendChild(header);

        Object.keys(metrics).forEach(mKey => {
            const activeSet = isGrowth ? data.growth : data.timeline;
            const lastVal = activeSet[activeSet.length - 1][mKey];
            const labelSuffix = isGrowth ? " IN LAST KVK" : "";
            const finalLabel = metrics[mKey] + labelSuffix;

            const mini = document.createElement('div');
            mini.className = "growth-card glow-purple";
            mini.style.cursor = "default";
            mini.innerHTML = `
                <div class="stat-label">${finalLabel}</div>
                <div class="stat-value" style="font-size:1.8rem;">${lastVal.toLocaleString()}</div>
                <div class="chart-container"><canvas id="solo-${mKey}"></canvas></div>
            `;
            grid.appendChild(mini);
            
            new Chart(document.getElementById(`solo-${mKey}`), {
                type: 'line',
                data: {
                    labels: activeSet.map(t => t.label),
                    datasets: [{ data: activeSet.map(t => t[mKey]), borderColor: '#9333ea', tension: 0.3, pointRadius: 4 }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false } } }
            });
        });
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        const headers = lines[0].toLowerCase().split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        const result = {};
        lines.slice(1).forEach(line => {
            const cells = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
            const row = {}; headers.forEach((h, i) => row[h] = cells[i]);
            if (targetServers.includes(row.home_server || row.server)) result[row.lord_id || row.id] = row;
        });
        return result;
    }
    window.onload = init;
</script>
</body>
</html>
