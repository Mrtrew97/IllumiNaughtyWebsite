<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intelligence Core // DRILLDOWN_V8.6</title>
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
/* CORE LAYERING & STICKY FIXES */
.app-container { position: relative; z-index: 1; }
.sticky-wrapper {
position: sticky; top: 0; z-index: 999; padding: 10px 0 20px 0;
background: transparent; backdrop-filter: blur(12px) saturate(150%);
-webkit-backdrop-filter: blur(12px) saturate(150%);
}
.primary-controls { display: flex; flex-wrap: wrap; gap: 15px; align-items: center; margin-bottom: 20px; }

/* TOGGLE STYLING */
.view-toggle-container {
display: flex; align-items: center; background: rgba(255, 255, 255, 0.05);
border-radius: 50px; padding: 4px; height: 34px; width: fit-content;
position: relative; border: 1px solid rgba(147, 51, 234, 0.3);
}
.toggle-btn {
background: transparent; border: none; color: #ffffff !important; 
padding: 0 18px; height: 100%; font-size: 0.65rem; font-weight: 900;
cursor: pointer; letter-spacing: 1.5px; transition: all 0.3s ease;
position: relative; z-index: 2; display: flex; align-items: center; justify-content: center;
border-radius: 50px; opacity: 0.6; text-transform: uppercase;
}
.toggle-btn.active { opacity: 1; text-shadow: 0 0 10px rgba(255, 255, 255, 0.5); }
.pill-slider {
position: absolute; background: var(--accent-purple); height: calc(100% - 8px);
top: 4px; left: 4px; border-radius: 50px; transition: all 0.3s ease;
z-index: 1; box-shadow: 0 0 15px rgba(147, 51, 234, 0.4);
}

/* ALLIANCE TOGGLE SPECIFIC */
.alliance-toggle {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.03); padding: 0 15px; border-radius: 50px;
    border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.3s;
    height: 34px;
}
.alliance-toggle:hover { background: rgba(255,255,255,0.08); }
.alliance-toggle.active { border-color: #fff; box-shadow: 0 0 15px rgba(255,255,255,0.15); background: rgba(255,255,255,0.1); }
.avg-dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; display: inline-block; }

.player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; padding: 40px 0; }
.growth-card { position: relative; z-index: 10; transition: transform 0.3s ease; cursor: pointer; }
.growth-card:hover { z-index: 11; transform: translateY(-8px); }
.metric-bar { display: flex; gap: 6px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }

/* SOLO HEADER & CONTROL ROW */
.solo-header { 
    grid-column: 1 / -1; 
    padding: 60px 0; 
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    width: 100%;
}
.solo-header h2 { 
    font-size: 3.5rem; 
    color: var(--text-title); 
    font-weight: 900; 
    text-transform: uppercase;
    margin: 10px 0;
}
.solo-label-id {
    font-size: 0.8rem;
    color: var(--text-dim);
    font-weight: 900;
    margin-bottom: 25px;
    letter-spacing: 1px;
}
.solo-controls-row {
    display: flex;
    align-items: center;
    gap: 15px;
    justify-content: center;
}

.chart-container { height: 160px; margin-top: 15px; }
.delta-text { font-weight: 900; font-size: 0.75rem; margin-top: 4px; letter-spacing: 1px; }
.positive { color: #10b981; }
.negative { color: #ef4444; }
</style>
</head>
<body>

<div class="loading-overlay" id="loader"><div class="loading-text">ENHANCING_NODES_AND_AVERAGES...</div></div>

<div class="app-container">
<div class="header-nav" id="headerNav" style="position: relative; z-index: 1000;">
<div id="navActionContainer">
<button class="exit-btn" onclick="window.location.href='index.html'">← SYSTEM_RETURN</button>
</div>
<div id="subjectCount" style="font-size: 0.75rem; font-weight: 900; color: var(--accent-purple); letter-spacing: 2px;">ACTIVE_MEMBERS // --</div>
</div>

<div id="drilldownContent">
<div class="sticky-wrapper" id="controlsWrapper">
<div class="primary-controls">
<div class="custom-select-wrapper">
<select id="seasonFolder" onchange="handleFolderChange()">
<option value="">-- SELECT DATA FOLDER --</option>
<option value="ALL_KVKS">★ ALL KVKS</option>
</select>
</div>
<input type="text" id="playerSearch" class="search-box" placeholder="SEARCH_LORDS..." oninput="renderDisplay()">

<div class="view-toggle-container" id="toggleWrapper" style="display: none;">
<div id="pill-bg" class="pill-slider"></div>
<button id="mode-total" class="toggle-btn active" onclick="setMode('total')">TOTAL</button>
<button id="mode-growth" class="toggle-btn" onclick="setMode('growth')">SINCE LAST KVK</button>
</div>

<div class="alliance-toggle" id="allianceToggle" onclick="toggleAllianceAverage()">
    <span class="avg-dot"></span>
    <span style="font-size: 0.65rem; font-weight: 900; color: #fff; letter-spacing: 1px;">ALLIANCE AVERAGE</span>
</div>
</div>
<div class="metric-bar" id="metricBar"></div>
</div>
<div class="player-grid" id="mainGrid"></div>
</div>
</div>

<script>
const BASE_PATH = "IData/"; 
const POWER_FLOOR = 15000000;
const MIN_SHEETS = 2; 
const targetServers = ["167", "509"];
let weeklyData = {};
let allianceAverages = { timeline: [], growthTimeline: [] };
let masterTimelineLabels = [];
let currentSortMetric = 'highest_power';
let fileListData = {};
let isAllKvksMode = false;
let selectedPlayerId = null;
let currentViewMode = 'total'; 
let showAllianceAvg = false;

const metrics = {
'highest_power': 'HIGHEST POWER', 'merits': 'MERITS', 'units_killed': 'TOTAL KILLS',
'killcount_t5': 'T5 KILLS', 'killcount_t4': 'T4 KILLS', 'killcount_t3': 'T3 KILLS',
'killcount_t2': 'T2 KILLS', 'killcount_t1': 'T1 KILLS', 'units_dead': 'DEADS',
'units_healed': 'HEALED', 'gold_spent': 'GOLD SPENT', 'wood_spent': 'WOOD SPENT',
'stone_spent': 'STONE SPENT', 'mana_spent': 'MANA SPENT'
};

function toggleAllianceAverage() {
    showAllianceAvg = !showAllianceAvg;
    document.querySelectorAll('.alliance-toggle').forEach(btn => btn.classList.toggle('active', showAllianceAvg));
    renderDisplay();
}

function cleanName(raw) { return raw === "ALL_KVKS" ? "★ ALL KVKS" : raw.replace(/^\d+\s*-\s*/, ''); }

function updatePillPosition(mode, isSolo = false) {
    const totalBtn = document.getElementById(isSolo ? 'mode-total-solo' : 'mode-total');
    const pill = document.getElementById(isSolo ? 'pill-bg-solo' : 'pill-bg');
    const growthBtn = document.getElementById(isSolo ? 'mode-growth-solo' : 'mode-growth');
    if (!totalBtn || !pill) return;
    if (mode === 'total') { pill.style.width = `${totalBtn.offsetWidth}px`; pill.style.left = `${totalBtn.offsetLeft}px`; } 
    else { pill.style.width = `${growthBtn.offsetWidth}px`; pill.style.left = `${growthBtn.offsetLeft}px`; }
}

function setMode(mode) {
    currentViewMode = mode;
    renderDisplay();
    setTimeout(() => updatePillPosition(mode, !!selectedPlayerId), 10);
}

async function init() {
    // FORCE CLEAR SEARCH BOX TO PREVENT BROWSER AUTO-FILL
    document.getElementById('playerSearch').value = "";
    
    createMetricButtons();
    
    // REDIRECTION LOGIC (Keeps direct links working)
    const urlParams = new URLSearchParams(window.location.search);
    const urlId = urlParams.get('id');
    
    if (urlId) {
        selectedPlayerId = urlId;
    } 

    try {
        const res = await fetch('data/files.json');
        fileListData = await res.json();
        const selector = document.getElementById('seasonFolder');
        fileListData.iDataFolders.forEach(folder => {
            const opt = document.createElement('option');
            opt.value = folder.name; opt.textContent = cleanName(folder.name);
            selector.appendChild(opt);
        });
        selector.value = "ALL_KVKS";
        handleFolderChange();
    } catch(e) { console.error("Init failed", e); }
}

function createMetricButtons() {
    const bar = document.getElementById('metricBar');
    bar.innerHTML = "";
    Object.entries(metrics).forEach(([key, label]) => {
        const btn = document.createElement('button');
        btn.className = `metric-btn ${key === currentSortMetric ? 'active' : ''}`;
        btn.textContent = label;
        btn.onclick = () => {
            document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); currentSortMetric = key; renderDisplay();
        };
        bar.appendChild(btn);
    });
}

async function handleFolderChange() {
    const val = document.getElementById('seasonFolder');
    if (!val.value) return;
    document.getElementById('loader').style.display = 'flex';
    
    weeklyData = {}; 
    isAllKvksMode = (val.value === 'ALL_KVKS');
    document.getElementById('toggleWrapper').style.display = isAllKvksMode ? 'flex' : 'none';

    try {
        if (isAllKvksMode) await loadDynamicAllKvks();
        else await loadSingleFolder(val.value);
    } catch (e) { console.error("Load Error:", e); }

    document.getElementById('loader').style.display = 'none';
    renderDisplay();
    if (isAllKvksMode) setTimeout(() => updatePillPosition(currentViewMode), 50);
}

async function loadDynamicAllKvks() {
    const folders = fileListData.iDataFolders;
    const latestFolder = folders[folders.length - 1];
    const latestPath = latestFolder.files[latestFolder.files.length - 1];
    const latestResp = await fetch(latestPath);
    const latestSheetData = parseCSV(await latestResp.text());
    const activeIds = Object.keys(latestSheetData).filter(id => parseInt(latestSheetData[id].highest_power) >= POWER_FLOOR);

    masterTimelineLabels = folders.map(f => {
    const fullPath = f.files[f.files.length - 1];
    return fullPath.split('/').pop().replace('.csv', '');
});
    
    allianceAverages.timeline = new Array(folders.length).fill(null);
    allianceAverages.growthTimeline = new Array(folders.length).fill(null);

    for (let i = 0; i < folders.length; i++) {
        const folderMeta = folders[i];
        const fPathName = folderMeta.name.replace('KVK', 'KvK');
        const files = folderMeta.files;
        if (files.length < 2) continue;

    const [respOld, respNew] = await Promise.all([
        fetch(files[0]), 
        fetch(files[files.length - 1])
    ]);
        const [dataOld, dataNew] = [parseCSV(await respOld.text()), parseCSV(await respNew.text())];

        let avgTotal = { label: masterTimelineLabels[i] }; let avgGrowth = { label: masterTimelineLabels[i] }; let count = 0;
        Object.keys(metrics).forEach(m => { avgTotal[m] = 0; avgGrowth[m] = 0; });

        activeIds.forEach(id => {
            if (!weeklyData[id]) {
                weeklyData[id] = { 
                    timeline: new Array(folders.length).fill(null), 
                    growthTimeline: new Array(folders.length).fill(null), 
                    latestStats: latestSheetData[id], 
                    sheetCount: 0 
                };
            }
            if (dataOld[id] && dataNew[id]) {
                let e = { label: masterTimelineLabels[i] }; Object.keys(metrics).forEach(m => e[m] = parseInt(dataNew[id][m]) || 0);
                let g = { label: masterTimelineLabels[i] }; Object.keys(metrics).forEach(m => g[m] = (parseInt(dataNew[id][m]) || 0) - (parseInt(dataOld[id][m]) || 0));
                
                weeklyData[id].timeline[i] = e; 
                weeklyData[id].growthTimeline[i] = g;
                weeklyData[id].sheetCount++;
                
                Object.keys(metrics).forEach(m => { avgTotal[m] += e[m]; avgGrowth[m] += g[m]; });
                count++;
            }
        });

        if (count > 0) {
            Object.keys(metrics).forEach(m => { 
                avgTotal[m] = Math.round(avgTotal[m] / count); 
                avgGrowth[m] = Math.round(avgGrowth[m] / count); 
            });
            allianceAverages.timeline[i] = avgTotal;
            allianceAverages.growthTimeline[i] = avgGrowth;
        }
    }
}

async function loadSingleFolder(folderName) {
    const folderMeta = fileListData.iDataFolders.find(f => f.name === folderName);
    const files = folderMeta.files;
    const latestResp = await fetch(files[files.length - 1]);
    const latestData = parseCSV(await latestResp.text());
    const activeIds = Object.keys(latestData).filter(id => parseInt(latestData[id].highest_power) >= POWER_FLOOR);

    masterTimelineLabels = files.map(f => f.split('/').pop().replace('.csv',''));
    allianceAverages.timeline = new Array(files.length).fill(null);

    for (let i = 0; i < files.length; i++) {
        const r = await fetch(files[i]);
        const d = parseCSV(await r.text());
        let avgTotal = { label: masterTimelineLabels[i] }; let count = 0;
        Object.keys(metrics).forEach(m => avgTotal[m] = 0);

        activeIds.forEach(id => {
            if (!weeklyData[id]) {
                weeklyData[id] = { timeline: new Array(files.length).fill(null), latestStats: latestData[id], sheetCount: 0 };
            }
            if (d[id]) {
                let e = { label: masterTimelineLabels[i] };
                Object.keys(metrics).forEach(m => e[m] = parseInt(d[id][m]) || 0);
                weeklyData[id].timeline[i] = e;
                weeklyData[id].sheetCount++;
                Object.keys(metrics).forEach(m => avgTotal[m] += e[m]);
                count++;
            }
        });
        if (count > 0) {
            Object.keys(metrics).forEach(m => avgTotal[m] = Math.round(avgTotal[m] / count));
            allianceAverages.timeline[i] = avgTotal;
        }
    }
}

function renderDisplay() {
    const grid = document.getElementById('mainGrid');
    const isGrowth = currentViewMode === 'growth' && isAllKvksMode;
    const query = document.getElementById('playerSearch').value.toLowerCase();
    document.querySelectorAll('canvas').forEach(c => { const chart = Chart.getChart(c); if(chart) chart.destroy(); });
    grid.innerHTML = "";

    if (selectedPlayerId && weeklyData[selectedPlayerId]) {
        document.getElementById('controlsWrapper').style.display = 'none';
        document.getElementById('navActionContainer').innerHTML = `<button class="exit-btn" onclick="exitSoloMode()">← TERMINATE_VIEW</button>`;
        renderSoloMode(selectedPlayerId, isGrowth);
        return;
    }

    document.getElementById('controlsWrapper').style.display = 'block';
    document.getElementById('navActionContainer').innerHTML = `<button class="exit-btn" onclick="window.location.href='index.html'">← SYSTEM_RETURN</button>`;

    const sorted = Object.values(weeklyData).filter(p => p.sheetCount >= (isAllKvksMode ? 1 : MIN_SHEETS)).sort((a,b) => {
        const tA = isGrowth ? a.growthTimeline : a.timeline;
        const tB = isGrowth ? b.growthTimeline : b.timeline;
        const valA = [...tA].reverse().find(v => v !== null)?.[currentSortMetric] || 0;
        const valB = [...tB].reverse().find(v => v !== null)?.[currentSortMetric] || 0;
        return valB - valA;
    });

    const filtered = sorted.filter(data => {
        const lordId = (data.latestStats.lord_id || data.latestStats.id || "").toString().toLowerCase();
        const name = (data.latestStats.name || "").toString().toLowerCase();
        return !query || name.includes(query) || lordId.includes(query);
    });

    document.getElementById('subjectCount').textContent = `ACTIVE_MEMBERS // ${filtered.length}`;

    filtered.forEach((data, index) => {
        const lordId = data.latestStats.lord_id || data.latestStats.id;
        const activeTimeline = isGrowth ? data.growthTimeline : data.timeline;
        const lastValid = [...activeTimeline].reverse().find(v => v !== null);
        let displayVal = lastValid ? lastValid[currentSortMetric] : 0;
        let displayLabel = isGrowth ? `${metrics[currentSortMetric]} SINCE LAST KVK` : metrics[currentSortMetric];

        const card = document.createElement('div');
        card.className = `growth-card ${index < 3 ? 'glow-'+(index+1) : 'glow-purple'}`;
        card.onclick = () => { selectedPlayerId = lordId; renderDisplay(); };
        card.innerHTML = `
            <div class="rank-banner ${index < 3 ? 'rank-'+(index+1)+'-banner' : 'rank-std-banner'}">#${index+1}</div>
            <h3 style="margin:0; font-size:1.6rem; color:var(--text-title);">${data.latestStats.name}</h3>
            <div style="font-size:0.65rem; color:var(--text-dim); font-weight:900; margin-top:4px;">ID: ${lordId}</div>
            <div style="margin:20px 0;">
                <div class="stat-label">${displayLabel}</div>
                <div class="stat-value" style="font-size:1.4rem;">${displayVal.toLocaleString()}</div>
            </div>
            <div class="chart-container"><canvas id="chart-${lordId}"></canvas></div>
        `;
        grid.appendChild(card);
        createChart(`chart-${lordId}`, activeTimeline, currentSortMetric, false, isGrowth);
    });
}

function renderSoloMode(id, isGrowth) {
    const grid = document.getElementById('mainGrid');
    const data = weeklyData[id];
    const header = document.createElement('div');
    header.className = 'solo-header';
    header.innerHTML = `
        <div class="stat-label" style="letter-spacing: 4px; color: var(--accent-purple); margin-bottom: 5px;">MEMBER_ANALYSIS</div>
        <h2>${data.latestStats.name}</h2>
        <div class="solo-label-id">ID: ${id}</div>
        <div class="solo-controls-row">
            <div class="view-toggle-container" style="display: ${isAllKvksMode ? 'flex' : 'none'};">
                <div id="pill-bg-solo" class="pill-slider"></div>
                <button id="mode-total-solo" class="toggle-btn ${currentViewMode === 'total' ? 'active' : ''}" onclick="setMode('total')">TOTAL</button>
                <button id="mode-growth-solo" class="toggle-btn ${currentViewMode === 'growth' ? 'active' : ''}" onclick="setMode('growth')">GROWTH</button>
            </div>
            <div class="alliance-toggle ${showAllianceAvg ? 'active' : ''}" onclick="toggleAllianceAverage()">
                <span class="avg-dot"></span>
                <span style="font-size: 0.65rem; font-weight: 900; color: #fff; letter-spacing: 1px;">ALLIANCE AVERAGE</span>
            </div>
        </div>
    `;
    grid.appendChild(header);

    Object.keys(metrics).forEach(mKey => {
        const activeTimeline = isGrowth ? data.growthTimeline : data.timeline;
        const lastValid = [...activeTimeline].reverse().find(v => v !== null);
        let displayVal = lastValid ? lastValid[mKey] : 0;
        
        const mini = document.createElement('div');
        mini.className = "growth-card glow-purple"; mini.style.cursor = "default";
        mini.innerHTML = `
            <div class="stat-label">${metrics[mKey]}</div>
            <div class="stat-value" style="font-size:1.8rem;">${displayVal.toLocaleString()}</div>
            <div class="chart-container" style="height:220px;"><canvas id="solo-${mKey}"></canvas></div>
        `;
        grid.appendChild(mini);
        createChart(`solo-${mKey}`, activeTimeline, mKey, true, isGrowth);
    });
    window.scrollTo(0,0);
    setTimeout(() => updatePillPosition(currentViewMode, true), 10);
}

function exitSoloMode() { 
    selectedPlayerId = null; 
    const url = new URL(window.location);
    url.searchParams.delete('id');
    window.history.replaceState({}, '', url);
    renderDisplay(); 
}

function createChart(canvasId, timeline, metricKey, isSolo, isGrowthMode) {
    const canvasElement = document.getElementById(canvasId);
    if (!canvasElement) return;
    const ctx = canvasElement.getContext('2d');
    
    const datasets = [{ 
        label: 'Player',
        data: timeline.map(entry => (entry ? entry[metricKey] : null)), 
        borderColor: '#9333ea', 
        pointRadius: isSolo ? 6 : 4,
        pointHoverRadius: isSolo ? 9 : 7,
        pointBackgroundColor: '#9333ea',
        tension: 0.3, 
        fill: false, 
        borderWidth: 2.5,
        spanGaps: true
    }];

    if (showAllianceAvg) {
        const avgSet = isGrowthMode ? allianceAverages.growthTimeline : allianceAverages.timeline;
        datasets.push({
            label: 'Alliance Average',
            data: avgSet.map(entry => (entry ? entry[metricKey] : null)),
            borderColor: '#ffffff',
            pointRadius: isSolo ? 5 : 3,
            pointHoverRadius: isSolo ? 8 : 6,
            pointBackgroundColor: '#ffffff',
            tension: 0.3, 
            fill: false, 
            borderWidth: 2,
            spanGaps: true
        });
    }

    new Chart(ctx, {
        type: 'line',
        data: { labels: masterTimelineLabels, datasets: datasets },
        options: { 
            responsive: true, maintainAspectRatio: false, 
            plugins: { 
                legend: { display: false },
                tooltip: {
                    enabled: true,
                    mode: 'index',
                    intersect: false,
                    backgroundColor: 'rgba(20, 20, 25, 0.9)',
                    titleColor: '#9333ea',
                    bodyColor: '#fff',
                    bodyFont: { weight: 'bold' },
                    callbacks: {
                        label: function(context) {
                            let label = context.dataset.label || '';
                            if (label) label += ': ';
                            if (context.parsed.y !== null) {
                                label += context.parsed.y.toLocaleString();
                            }
                            return label;
                        }
                    }
                }
            }, 
            interaction: {
                mode: 'nearest',
                axis: 'x',
                intersect: false
            },
            scales: { 
                x: { 
                    ticks: { 
                        color: '#9d8ba1', 
                        font: { size: 14 }, 
                        maxRotation: 45, 
                        minRotation: 45 
                    }, 
                    grid: { display: false } 
                }, 
                y: { display: false } 
            } 
        }
    });
}

function parseCSV(text) {
    const lines = text.split(/\r?\n/).filter(l => l.trim());
    if (lines.length < 2) return {};
    const headers = lines[0].toLowerCase().split(',').map(h => h.trim().replace(/^"|"$/g, ''));
    const result = {};
    lines.slice(1).forEach(line => {
        const cells = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.trim().replace(/^"|"$/g, ''));
        const row = {}; headers.forEach((h, i) => row[h] = cells[i]);
        if (targetServers.includes(row.home_server || row.server)) result[row.lord_id || row.id] = row;
    });
    return result;
}
window.onload = init;
</script>
</body>
</html>
