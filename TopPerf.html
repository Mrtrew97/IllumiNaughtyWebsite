<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Performance // KVK-DATA</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        /* UI COMPONENT STYLES - PRESERVING ORIGINAL FUNCTIONALITY */
        
        /* PODIUM AREA - 2 1 3 ORDER */
        .podium-container {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1fr;
            gap: 40px;
            align-items: end;
            max-width: 1050px;
            margin: 100px auto 60px auto;
            padding: 0 20px;
        }

        .podium-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .rank-2-wrapper { order: 1; }
        .rank-1-wrapper { order: 2; }
        .rank-3-wrapper { order: 3; }

        .podium-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 40px 20px 25px 20px;
            position: relative;
            backdrop-filter: blur(15px);
            clip-path: polygon(15% 0, 100% 0, 100% 85%, 85% 100%, 0 100%, 0 15%);
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .rank-number {
            font-size: 6rem;
            font-weight: 900;
            line-height: 0.8;
            position: absolute;
            top: -55px;
            left: -15px;
            font-style: italic;
            z-index: 10;
            pointer-events: none;
        }

        /* Card Glows */
        .rank-1-wrapper .podium-card { 
            height: 320px; 
            border: 1px solid var(--rank-1); 
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.4), 0 0 40px rgba(251, 191, 36, 0.1); 
        }
        .rank-1-wrapper .rank-number { color: var(--rank-1); text-shadow: 0 0 30px var(--rank-1); }
        
        .rank-2-wrapper .podium-card { 
            height: 260px; 
            border: 1px solid var(--rank-2); 
            box-shadow: 0 0 12px rgba(226, 232, 240, 0.3), 0 0 30px rgba(226, 232, 240, 0.05); 
        }
        .rank-2-wrapper .rank-number { color: var(--rank-2); text-shadow: 0 0 25px var(--rank-2); }
        
        .rank-3-wrapper .podium-card { 
            height: 220px; 
            border: 1px solid var(--rank-3); 
            box-shadow: 0 0 12px rgba(205, 127, 50, 0.4), 0 0 30px rgba(205, 127, 50, 0.05); 
        }
        .rank-3-wrapper .rank-number { color: var(--rank-3); text-shadow: 0 0 25px var(--rank-3); }

        .p-name { font-weight: 900; text-transform: uppercase; letter-spacing: -0.5px; text-align: center; width: 100%; }
        .podium-card .p-name { font-size: 1.3rem; margin-bottom: 5px; }

        .stat-display {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(147, 51, 234, 0.6);
            padding: 12px 10px;
            margin-top: 20px;
            width: 100%;
            box-sizing: border-box;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* LEADERBOARD LIST */
        .perf-table-container {
            width: 100%;
            margin: 0 auto 50px auto;
            background: var(--card-bg);
            border-top: 1px solid var(--border-color);
        }

        .perf-row {
            display: grid;
            grid-template-columns: 1fr 1.5fr 1fr 1.5fr 1fr;
            padding: 20px 0;
            align-items: center;
            border-bottom: 1px solid rgba(147, 51, 234, 0.15);
        }

        .perf-row > div {
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .perf-row.header {
            background: rgba(147, 51, 234, 0.1);
            padding: 15px 0;
            border-bottom: 2px solid var(--accent-purple);
        }

        .tag-column {
            color: var(--accent-purple);
            font-weight: 900;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(147, 51, 234, 0.4);
        }

        .p-rank { font-weight: 900; color: var(--text-dim); opacity: 0.4; font-style: italic; }
        .p-name-list { color: white; font-weight: 800; font-size: 1rem; }
        .p-metric { font-family: monospace; font-weight: 700; }
        .p-diff { font-family: monospace; font-weight: 700; }

        /* Controls */
        .primary-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .custom-select-wrapper select {
            background: #000;
            color: white;
            border: 1px solid var(--border-color);
            padding: 8px 12px;
            font-weight: 700;
        }

        .metric-bar {
            display: flex;
            flex-wrap: wrap; 
            gap: 8px;
            padding: 10px 0;
            margin-bottom: 25px;
            justify-content: center;
        }

        .metric-btn {
            background: #000;
            border: 1px solid var(--border-color);
            color: var(--text-dim);
            padding: 8px 16px;
            font-size: 0.65rem;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        .metric-btn.active {
            background: var(--accent-purple);
            color: white;
            border-color: #fff;
        }

        .vs-badge { font-size: 0.65rem; font-weight: 900; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="loading-overlay" id="globalLoader">
    <div class="stat-label" style="font-size: 1rem;">CORRECTING_ALIGNMENT_MATRIX...</div>
</div>

<div class="app-container">
    <header class="header-nav">
        <a href="index.html" class="exit-btn">← SYSTEM_RETURN</a>
        <div style="text-align: right;">
            <div class="stat-label" id="namingSourceLabel">FETCHING_DATA...</div>
            <h1 style="margin:0; font-size: 1.5rem; font-weight: 900; letter-spacing: -1px; text-transform: uppercase;">TOP_PERFORMANCE</h1>
        </div>
    </header>

    <div class="primary-controls">
        <div class="custom-select-wrapper"><select id="dateStart" onchange="loadPerformanceData()"></select></div>
        <div class="vs-badge">TO</div>
        <div class="custom-select-wrapper"><select id="dateEnd" onchange="loadPerformanceData()"></select></div>
        
        <div style="display:flex; background:#000; border:1px solid var(--border-color); padding:2px;">
            <button class="metric-btn active" id="modeGrowth" onclick="setMode('growth')" style="border:none;">Growth</button>
            <button class="metric-btn" id="modeTotal" onclick="setMode('total')" style="border:none;">Total</button>
        </div>

        <div class="vs-badge">ALLIANCE</div>
        <div class="custom-select-wrapper">
            <select id="allianceFilter" onchange="applyFilters()">
                <option value="ALL">ALL_PLAYERS</option>
            </select>
        </div>
    </div>

    <div class="metric-bar" id="metricBar"></div>

    <div id="podiumArea" class="podium-container"></div>

    <div class="perf-table-container">
        <div class="perf-row header">
            <div class="stat-label">RANK</div>
            <div class="stat-label">PLAYER_NAME</div>
            <div class="stat-label">ALLIANCE_TAG</div>
            <div class="stat-label">TOTAL_VALUE</div>
            <div class="stat-label">PERIOD_GROWTH</div>
        </div>
        <div id="leaderboardList"></div>
    </div>
</div>

<script>
    let fileDataCache = {};
    let fullPerformanceData = [];
    let masterAllianceMap = {};
    const POWER_THRESHOLD = 35000000;
    let currentMetric = 'highest_power';
    let currentMode = 'growth';

    const metrics = {
        'highest_power': 'HIGHEST POWER',
        'merits': 'MERITS',
        'units_killed': 'KILLS',
        'killcount_t5': 'T5 KILLS',
        'killcount_t4': 'T4 KILLS',
        'killcount_t3': 'T3 KILLS',
        'killcount_t2': 'T2 KILLS',
        'killcount_t1': 'T1 KILLS',
        'units_dead': 'DEADS',
        'units_healed': 'HEALED',
        'gold_spent': 'GOLD USED',
        'wood_spent': 'WOOD USED',
        'stone_spent': 'STONE USED',
        'mana_spent': 'MANA USED'
    };

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('modeGrowth').classList.toggle('active', mode === 'growth');
        document.getElementById('modeTotal').classList.toggle('active', mode === 'total');
        applyFilters();
    }

    function parseToNum(val) {
        if (!val || val === '-') return 0;
        return parseInt(val.toString().replace(/[^0-9-]/g, ''), 10) || 0;
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        if (lines.length === 0) return [];
        const headers = lines[0].split(',').map(h => h.toLowerCase().replace(/["\s]/g, ''));
        return lines.slice(1).map(line => {
            const cells = line.split(',');
            const row = {};
            headers.forEach((h, i) => { row[h] = cells[i] ? cells[i].replace(/^"|"$/g, '').trim() : ""; });
            return row;
        });
    }

    function dateFromFilename(name) {
        const parts = name.replace('.csv', '').split('-');
        return parts.length !== 3 ? new Date(0) : new Date(parts[2], parts[1] - 1, parts[0]);
    }

    function createMetricButtons() {
        const bar = document.getElementById('metricBar');
        bar.innerHTML = "";
        Object.entries(metrics).forEach(([key, label]) => {
            const btn = document.createElement('button');
            btn.className = `metric-btn ${key === currentMetric ? 'active' : ''}`;
            btn.textContent = label;
            btn.onclick = () => {
                document.querySelectorAll('.metric-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentMetric = key;
                loadPerformanceData();
            };
            bar.appendChild(btn);
        });
    }

    async function scanFiles() {
        showLoader(true);
        createMetricButtons();
        try {
            const response = await fetch('data/');
            const html = await response.text();
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = html;
            const links = Array.from(tempDiv.querySelectorAll('a'));
            let foundFiles = links.map(link => link.getAttribute('href').split('/').pop()).filter(name => name.endsWith('.csv'));
            
            if (foundFiles.length === 0) return;
            const fileObjects = foundFiles.map(name => ({ name, date: dateFromFilename(name) }));
            fileObjects.sort((a, b) => a.date - b.date);

            const oldestFile = fileObjects[0].name;
            const masterRes = await fetch(`data/${oldestFile}`);
            const masterData = parseCSV(await masterRes.text());
            masterData.forEach(row => {
                const sID = row.home_server;
                if (sID && row.alliance_tag && !masterAllianceMap[sID]) masterAllianceMap[sID] = row.alliance_tag;
            });
            document.getElementById('namingSourceLabel').innerText = `TAG_SOURCE: ${oldestFile.replace('.csv','')}`;

            const sSelect = document.getElementById('dateStart');
            const eSelect = document.getElementById('dateEnd');
            fileObjects.forEach(obj => {
                const opt = document.createElement('option');
                opt.value = obj.name; opt.textContent = obj.name.replace('.csv','');
                sSelect.appendChild(opt.cloneNode(true));
                eSelect.appendChild(opt);
            });
            if(fileObjects.length > 1) { sSelect.selectedIndex = 0; eSelect.selectedIndex = fileObjects.length - 1; }
            await loadPerformanceData();
        } catch (e) { console.error(e); }
        showLoader(false);
    }

    async function loadPerformanceData() {
        const startFile = document.getElementById('dateStart').value;
        const endFile = document.getElementById('dateEnd').value;
        if (!startFile || !endFile) return;

        if (!fileDataCache[startFile]) fileDataCache[startFile] = parseCSV(await (await fetch(`data/${startFile}`)).text());
        if (!fileDataCache[endFile]) fileDataCache[endFile] = parseCSV(await (await fetch(`data/${endFile}`)).text());

        updateAllianceDropdown();
        calculateRankings(fileDataCache[startFile], fileDataCache[endFile], currentMetric);
    }

    function updateAllianceDropdown() {
        const dropdown = document.getElementById('allianceFilter');
        const currentVal = dropdown.value;
        const sIDs = Object.keys(masterAllianceMap).sort((a,b) => a.localeCompare(b, undefined, {numeric: true}));
        dropdown.innerHTML = '<option value="ALL">ALL_PLAYERS</option>';
        sIDs.forEach(sid => {
            const opt = document.createElement('option');
            opt.value = sid; opt.textContent = `${masterAllianceMap[sid]} [${sid}]`;
            dropdown.appendChild(opt);
        });
        dropdown.value = currentVal;
    }

    function calculateRankings(startData, endData, metric) {
        const startMap = new Map(startData.map(p => [p.lord_id, p]));
        fullPerformanceData = endData.map(pEnd => {
            const pStart = startMap.get(pEnd.lord_id);
            if (!pStart || parseToNum(pEnd.highest_power) < POWER_THRESHOLD) return null;
            const startVal = parseToNum(pStart[metric]);
            const endVal = parseToNum(pEnd[metric]);

            return {
                name: pEnd.name,
                tag: pEnd.alliance_tag || '---',
                server: pEnd.home_server || '',
                total: endVal,
                growth: endVal - startVal
            };
        }).filter(p => p !== null);
        applyFilters();
    }

    function applyFilters() {
        const allianceID = document.getElementById('allianceFilter').value;
        let filtered = [...fullPerformanceData];
        if (allianceID !== 'ALL') filtered = filtered.filter(p => p.server === allianceID);

        currentMode === 'growth' ? filtered.sort((a, b) => b.growth - a.growth) : filtered.sort((a, b) => b.total - a.total);
        renderUI(filtered);
    }

    function renderUI(data) {
        const podiumArea = document.getElementById('podiumArea');
        const listArea = document.getElementById('leaderboardList');
        const top3 = data.slice(0, 3);
        const displayOrder = [1, 0, 2]; // Visual order 2-1-3
        
        let podiumHTML = "";
        displayOrder.forEach(idx => {
            const p = top3[idx];
            if (!p) return;
            const displayVal = currentMode === 'growth' ? p.growth : p.total;
            const label = currentMode === 'growth' ? 'PERIOD_GROWTH' : 'FINAL_TOTAL';
            const rankActual = idx + 1;
            
            podiumHTML += `
            <div class="podium-wrapper rank-${rankActual}-wrapper">
                <div class="rank-number">0${rankActual}</div>
                <div class="podium-card">
                    <div class="p-name">${p.name}</div>
                    <div class="tag-column" style="margin-top:2px; font-size:0.75rem;">${p.tag}</div>
                    <div class="stat-display">
                        <span style="display:block; font-family:monospace; font-weight:900; font-size:1.2rem;">${(p.growth >= 0 && currentMode === 'growth' ? '+' : '')}${displayVal.toLocaleString()}</span>
                        <span style="font-size:0.55rem; color:var(--text-dim); text-transform:uppercase;">${label}</span>
                    </div>
                </div>
            </div>`;
        });
        podiumArea.innerHTML = podiumHTML;

        listArea.innerHTML = data.slice(3, 100).map((p, i) => `
            <div class="perf-row">
                <div class="p-rank">#${i + 4}</div>
                <div class="p-name-list">${p.name}</div>
                <div class="tag-column">${p.tag}</div>
                <div class="p-metric">${p.total.toLocaleString()}</div>
                <div class="p-diff" style="color:${p.growth >= 0 ? 'var(--positive)' : 'var(--negative)'}">${p.growth >= 0 ? '+' : ''}${p.growth.toLocaleString()}</div>
            </div>`).join('');
    }

    function showLoader(show) { document.getElementById('globalLoader').style.display = show ? 'flex' : 'none'; }
    window.onload = scanFiles;
</script>
</body>
</html>
